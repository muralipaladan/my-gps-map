<!DOCTYPE html>
<html>
<head>
    <title>GPS Tracker - Murali's GIS Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Draw -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    
    <!-- Omnivore for KML -->
    <script src="https://unpkg.com/@mapbox/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        #map { height: 100vh; width: 100%; position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
        
        /* Village Boundary Style */
        .village-style {
            filter: contrast(500%) brightness(40%) saturate(10) blur(0.2px) hue-rotate(320deg) !important;
            opacity: 1;
        }

        /* Controls - Default Hidden */
        .leaflet-control-layers, .leaflet-draw {
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
        }

        /* Show on map interaction */
        .show-controls .leaflet-control-layers, 
        .show-controls .leaflet-draw {
            opacity: 1;
            pointer-events: auto;
        }

        .control-panel {
            position: absolute; bottom: 10px; left: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.8); padding: 5px; border-radius: 8px;
            display: flex; flex-direction: row; gap: 5px;
            opacity: 0; transition: opacity 0.5s;
        }

        .show-controls .control-panel { opacity: 1; }

        .gps-button {
            background-color: white; border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px; padding: 8px; cursor: pointer;
            font-size: 18px; color: #333; text-align: center;
            display: block; width: 34px; height: 34px; line-height: 34px;
        }
        .active-gps { color: #28a745; border-color: #28a745; }
        
        .btn, .file-label {
            background: #007bff; color: white; border: none;
            padding: 8px 10px; border-radius: 4px; cursor: pointer;
            font-size: 12px; text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="control-panel" id="bottomPanel">
    <button class="btn" onclick="downloadKML()"><i class="fa-solid fa-download"></i> Save</button>
    <label class="file-label">
        <i class="fa-solid fa-upload"></i> Load <input type="file" id="uploadKML" accept=".kml">
    </label>
</div>

<script>
    // 1. BASE MAP LAYERS
    var osmStandard = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    var googleHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });
    var googleRoads = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });

    // 2. BHUVAN LAYERS
    var bhuvanURL = 'https://bhuvan-panchayat3.nrsc.gov.in/geoserver/gwc/service/wms';
    var villageLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:village', format: 'image/png', transparent: true, className: 'village-style' });
    var cadastralLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:cadastral', format: 'image/png', transparent: true });

    // 3. INITIALIZE MAP[cite: 1]
    var map = L.map('map', {
        center: [11.196, 76.227], zoom: 14,
        layers: [googleHybrid, villageLayer],
        zoomControl: false // Manual hidden
    });

    // Toggle controls on touch
    map.on('click', function() {
        document.body.classList.toggle('show-controls');
    });

    var baseMaps = { "Hybrid": googleHybrid, "Road": googleRoads, "OSM": osmStandard };
    var overlayMaps = { "Village": villageLayer, "Cadastral": cadastralLayer };

    L.control.layers(baseMaps, overlayMaps, {collapsed: true}).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    // 4. DRAWING[cite: 1]
    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);
    var drawControl = new L.Control.Draw({
        edit: { featureGroup: drawnItems },
        draw: { polygon: true, polyline: true, rectangle: true, marker: true, circle: false }
    });
    map.addControl(drawControl);
    map.on(L.Draw.Event.CREATED, function (e) { drawnItems.addLayer(e.layer); });

    // 5. KML LOGIC[cite: 1]
    function downloadKML() {
        if (drawnItems.getLayers().length === 0) return alert("Draw something first!");
        var kml = '<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>';
        drawnItems.eachLayer(function(layer) {
            kml += '<Placemark><LineString><coordinates>';
            var coords = layer.getLatLngs ? (Array.isArray(layer.getLatLngs()[0]) ? layer.getLatLngs()[0] : layer.getLatLngs()) : [layer.getLatLng()];
            coords.forEach(ll => kml += (ll.lng || ll.lng) + ',' + (ll.lat || ll.lat) + ',0 ');
            kml += '</coordinates></LineString></Placemark>';
        });
        kml += '</Document></kml>';
        var a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([kml], {type: "application/vnd.google-earth.kml+xml"}));
        a.download = "Map.kml"; a.click();
    }

    document.getElementById('uploadKML').addEventListener('change', function(e) {
        var reader = new FileReader();
        reader.onload = function(event) {
            var l = omnivore.kml.parse(event.target.result).addTo(map);
            l.on('ready', function() { map.fitBounds(l.getBounds()); });
        };
        reader.readAsText(e.target.files[0]);
    });

    // 6. GPS[cite: 1]
    var locationMarker, isTracking = false;
    var gpsControl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function (map) {
            var btn = L.DomUtil.create('a', 'gps-button leaflet-bar leaflet-control');
            btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i>';
            L.DomEvent.on(btn, 'click', function (e) {
                L.DomEvent.stopPropagation(e);
                if (!isTracking) {
                    map.locate({ setView: true, watch: true, enableHighAccuracy: true });
                    btn.classList.add('active-gps');
                    isTracking = true;
                } else {
                    map.stopLocate();
                    btn.classList.remove('active-gps');
                    isTracking = false;
                }
            });
            return btn;
        }
    });
    map.addControl(new gpsControl());
    map.on('locationfound', function(e) {
        if (!locationMarker) locationMarker = L.marker(e.latlng).addTo(map);
        else locationMarker.setLatLng(e.latlng);
    });
</script>
</body>
</html>
