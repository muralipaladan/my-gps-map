<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sodestus — Pro Georeference & Tracing</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:          #07090e;
      --surface:     rgba(10,13,20,0.96);
      --surface-2:   rgba(255,255,255,0.06);
      --surface-3:   rgba(255,255,255,0.10);
      --border:      rgba(255,255,255,0.09);
      --border-hi:   rgba(255,255,255,0.18);
      --accent:      #e55c00;
      --accent-glow: rgba(229,92,0,0.35);
      --accent-hi:   #ff7a26;
      --green:       #16a34a;
      --green-glow:  rgba(22,163,74,0.30);
      --red:         #dc2626;
      --red-glow:    rgba(220,38,38,0.30);
      --amber:       #d97706;
      --blue:        #2563eb;
      --blue-glow:   rgba(37,99,235,0.35);
      --blue-light:  #60a5fa;
      --text:        #dde4ef;
      --text-dim:    #4b5a72;
      --text-mid:    #8899b0;
      --ribbon-w:    50px;
      --r-sm:        6px;
      --r-md:        11px;
      --r-lg:        16px;
      --r-pill:      999px;
      --sh-sm:       0 2px 10px rgba(0,0,0,0.5);
      --sh-md:       0 4px 28px rgba(0,0,0,0.7);
      --sh-lg:       0 8px 48px rgba(0,0,0,0.85);
      --ease:        cubic-bezier(.4,0,.2,1);
      --spring:      cubic-bezier(.34,1.56,.64,1);
      --t1: 300ms; --t2: 700ms; --t3: 1000ms;
      --font:        'Syne', sans-serif;
      --mono:        'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100%; background:var(--bg); font-family:var(--font); color:var(--text); overflow:hidden; -webkit-font-smoothing:antialiased; }

    #map { position:absolute; inset:0; z-index:1; }

    .hud {
      opacity:0; visibility:hidden; pointer-events:none;
      transition: opacity var(--t2) var(--ease), visibility var(--t2) var(--ease), transform var(--t2) var(--ease);
    }
    .show-ui .hud { opacity:1; visibility:visible; pointer-events:auto; }

    .ribbon {
      position:absolute; top:94px; left:14px; z-index:2000;
      width:var(--ribbon-w);
      display:flex; flex-direction:column; align-items:center; gap:5px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--r-lg);
      padding:10px 5px;
      box-shadow:var(--sh-lg);
      max-height:88vh; overflow-y:auto; overflow-x:hidden;
      scrollbar-width:none;
      transform:translateX(0);
      transition: top var(--t2) var(--ease), padding var(--t2) var(--ease), background var(--t2) var(--ease), border-color var(--t2) var(--ease), opacity var(--t2) var(--ease);
    }
    .ribbon::-webkit-scrollbar { display:none; }
    .ribbon::after {
      content:''; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
      background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.008) 3px,rgba(255,255,255,.008) 4px);
    }
    .rdiv { width:72%; height:1px; background:var(--border); flex-shrink:0; margin:2px 0; }

    .ribbon.minimized:not(.expanded-touch):not(:hover) > *:not(#gpsBtn):not(#drawMainGroupBtn):not(#layerBtn):not(#fmbLoadLabel):not(#fmbTools):not(.sub-group.open) {
      display: none !important;
    }
    .ribbon.minimized {
      padding: 5px;
      background: rgba(10, 13, 20, 0.55);
      border-color: rgba(255, 255, 255, 0.05);
      gap: 4px;
      box-shadow: var(--sh-sm);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0.35;
    }
    
    .ribbon.minimized.expanded-touch,
    .ribbon.minimized:hover {
      padding: 10px 5px;
      background: var(--surface);
      border-color: var(--border);
      gap: 5px;
      box-shadow: var(--sh-lg);
      opacity: 1 !important;
    }

    .rb {
      position:relative; width:38px; height:38px; flex-shrink:0;
      background:var(--surface-2); color:var(--text);
      border:1px solid transparent; border-radius:var(--r-sm);
      cursor:pointer; font-size:14px;
      display:flex; align-items:center; justify-content:center;
      transition: background var(--t1) var(--ease), border-color var(--t1) var(--ease),
                  transform var(--t1) var(--spring), box-shadow var(--t1) var(--ease), color var(--t1) var(--ease);
    }
    .rb:hover  { background:var(--surface-3); border-color:var(--border-hi); transform:scale(1.07); }
    .rb:active { transform:scale(0.91); }
    .rb.on-accent { background:var(--accent)!important; color:#fff!important; border-color:var(--accent-hi)!important; box-shadow:0 0 14px var(--accent-glow); }
    .rb.on-green  { background:var(--green)!important;  color:#fff!important; border-color:#15803d!important; box-shadow:0 0 12px var(--green-glow); }
    .rb.on-blue   { background:var(--blue)!important;   color:#fff!important; border-color:#1d4ed8!important; box-shadow:0 0 14px var(--blue-glow); animation:gpsGlow 2s ease-in-out infinite; }
    .rb.on-red    { background:rgba(220,38,38,.14)!important; color:var(--red)!important; border-color:rgba(220,38,38,.35)!important; }
    @keyframes gpsGlow {
      0%,100% { box-shadow:0 0 10px var(--blue-glow); }
      50%      { box-shadow:0 0 22px rgba(37,99,235,0.55); }
    }

    .rb[data-tip]::after {
      content:attr(data-tip);
      position:absolute; left:calc(100% + 11px); top:50%;
      transform:translateY(-50%) translateX(-6px);
      background:var(--surface); color:var(--text);
      font-family:var(--font); font-size:11px; font-weight:700; letter-spacing:.4px;
      white-space:nowrap; padding:4px 10px;
      border-radius:var(--r-sm); border:1px solid var(--border-hi);
      box-shadow:var(--sh-sm); pointer-events:none;
      opacity:0; transition:opacity var(--t1) var(--ease), transform var(--t1) var(--ease);
    }
    .rb[data-tip]:hover::after { opacity:1; transform:translateY(-50%) translateX(0); }

    .sub-group {
      display:none; flex-direction:column; align-items:center; gap:4px;
      background:rgba(255,255,255,.035); border:1px solid var(--border);
      border-radius:var(--r-sm); padding:6px; width:92%;
    }
    .sub-group.open { display:flex; animation:sgIn var(--t2) var(--ease) both; }
    @keyframes sgIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

    .mb {
      width:30px; height:30px;
      background:var(--surface-2); color:var(--text);
      border:1px solid var(--border); border-radius:var(--r-sm);
      font-size:12px; display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:background var(--t1),transform var(--t1) var(--spring);
    }
    .mb:hover  { background:var(--surface-3); }
    .mb:active { background:var(--amber); color:#000; transform:scale(.88); }
    .mb-row    { display:flex; gap:4px; }

    .slider-wrap { display:flex; flex-direction:column; align-items:center; width:100%; padding:4px 0; }
    input[type=range].vslider {
      -webkit-appearance:none; width:30px; height:5px;
      background:linear-gradient(to right, var(--accent) 0%, var(--surface-3) 0%);
      border-radius:3px; outline:none; cursor:pointer;
    }
    input[type=range].vslider::-webkit-slider-thumb {
      -webkit-appearance:none; width:13px; height:13px; border-radius:50%;
      background:var(--accent); border:2px solid #fff;
      box-shadow:0 0 6px var(--accent-glow); cursor:pointer;
    }

    /* Search Bar ബാഡ്ജ് ഇരുന്ന മുകൾ ഭാഗത്തേക്ക് (top: 8px) ഷിഫ്റ്റ് ചെയ്തു */
    .searchbar {
      position:absolute; top:8px; right:14px; z-index:2000;
      display:flex; align-items:center; gap:4px;
      background:rgba(10, 13, 20, 0.85); border:1px solid var(--border);
      border-radius:var(--r-md); padding:5px 5px;
      box-shadow:var(--sh-md);
      width: calc(100% - 28px);
      max-width: 320px;
      transition:top var(--t2) var(--ease), border-color var(--t1), box-shadow var(--t1), width var(--t2) var(--ease), max-width var(--t2) var(--ease), padding var(--t2) var(--ease);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .searchbar.collapsed {
      width:42px; max-width:42px; padding:0; border-color:transparent; background:transparent; box-shadow:none; backdrop-filter:none; -webkit-backdrop-filter:none;
    }
    .searchbar.collapsed input,
    .searchbar.collapsed #searchPhoneInfo,
    .searchbar.collapsed #searchBtn { display:none; }
    .searchbar:not(.collapsed) #searchToggleBtn { display:none; }
    #searchToggleBtn {
      background:var(--accent); color:#fff; border:none;
      width:38px; height:38px; border-radius:50%;
      font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      box-shadow:var(--sh-md);
      transition:background var(--t1), transform var(--t1) var(--spring);
    }
    #searchToggleBtn:hover { background:var(--accent-hi); }
    #searchToggleBtn:active { transform:scale(.88); }
    .searchbar:focus-within { border-color:var(--border-hi); box-shadow:var(--sh-md), 0 0 0 2px rgba(229,92,0,.2); }
    .searchbar input {
      background:none; border:none; outline:none;
      color:var(--text); font-family:var(--font); font-size:13px; font-weight:600; letter-spacing:.2px;
      width:100%; padding:5px 8px;
    }
    .searchbar input::placeholder { color:var(--text-dim); font-weight:400; }
    .searchbar button {
      background:var(--accent); color:#fff; border:none;
      width:32px; height:32px; border-radius:var(--r-sm);
      font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background var(--t1), transform var(--t1) var(--spring);
    }
    .searchbar button:hover  { background:var(--accent-hi); }
    .searchbar button:active { transform:scale(.88); }

    .ctrl-panel {
      position:absolute; bottom:14px; left:50%; transform:translateX(-50%); z-index:2000;
      display:flex; gap:8px; align-items:center;
      background:rgba(10, 13, 20, 0.75); border:1px solid rgba(255, 255, 255, 0.08);
      border-radius:var(--r-pill); padding:6px 14px; box-shadow:var(--sh-lg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform var(--t2) var(--spring), opacity var(--t2) var(--ease);
    }
    .btn {
      display:inline-flex; align-items:center; gap:6px;
      border:none; border-radius:var(--r-pill); cursor:pointer;
      font-family:var(--font); font-size:10.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
      padding:7px 15px; text-decoration:none;
      transition:filter var(--t1), transform var(--t1) var(--spring), box-shadow var(--t1);
    }
    .btn:hover  { filter:brightness(1.15); box-shadow:0 4px 18px rgba(0,0,0,.4); }
    .btn:active { transform:scale(.94); }
    .btn-export  { background:var(--accent); color:#fff; }
    .btn-import  { background:var(--surface-3); color:var(--text); border:1px solid var(--border-hi); }

    #toast-root {
      position:fixed; bottom:80px; right:16px; z-index:9999;
      display:flex; flex-direction:column; gap:8px; align-items:flex-end; pointer-events:none;
    }
    .toast {
      display:flex; align-items:flex-start; gap:10px;
      background:var(--surface); border:1px solid var(--border-hi);
      border-radius:var(--r-md); padding:11px 16px;
      box-shadow:var(--sh-lg); max-width:300px; pointer-events:auto;
      animation:toastIn var(--t2) var(--spring) both;
      border-left:3px solid var(--accent);
    }
    .toast.info  { border-left-color:var(--blue); }
    .toast.ok    { border-left-color:var(--green); }
    .toast.warn  { border-left-color:var(--amber); }
    .toast.error { border-left-color:var(--red); }
    .toast.out   { animation:toastOut var(--t2) var(--ease) both; }
    @keyframes toastIn  { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:none} }
    @keyframes toastOut { to{opacity:0;transform:translateX(16px)} }
    .toast-icon { font-size:14px; margin-top:1px; flex-shrink:0; }
    .toast.info  .toast-icon { color:var(--blue-light); }
    .toast.ok    .toast-icon { color:#4ade80; }
    .toast.warn  .toast-icon { color:#fbbf24; }
    .toast.error .toast-icon { color:#f87171; }
    .toast-msg { font-family:var(--font); font-size:12px; line-height:1.55; color:var(--text); }

    .modal-backdrop {
      position:fixed; inset:0; z-index:9998; background:rgba(0,0,0,.7);
      display:none; align-items:center; justify-content:center;
      animation:fadeIn var(--t2) var(--ease);
    }
    .modal-backdrop.open { display:flex; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal {
      background:var(--surface); border:1px solid var(--border-hi);
      border-radius:var(--r-lg); padding:24px 28px; max-width:340px; width:90%;
      box-shadow:var(--sh-lg); animation:modalIn var(--t2) var(--spring) both;
    }
    @keyframes modalIn { from{opacity:0;transform:scale(.94) translateY(8px)} to{opacity:1;transform:none} }
    .modal-title { font-size:15px; font-weight:700; margin-bottom:10px; color:var(--text); }
    .modal-body  { font-size:12.5px; color:var(--text-mid); line-height:1.6; margin-bottom:20px; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
    .modal-btn {
      padding:8px 20px; border:none; border-radius:var(--r-sm);
      font-family:var(--font); font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
      cursor:pointer; transition:filter var(--t1), transform var(--t1) var(--spring);
    }
    .modal-btn:hover  { filter:brightness(1.15); box-shadow:0 4px 18px rgba(0,0,0,.4); }
    .modal-btn:active { transform:scale(.93); }
    .modal-btn.cancel { background:var(--surface-3); color:var(--text-mid); }
    .modal-btn.confirm { background:var(--red); color:#fff; }

    .blue-dot-container { display:flex!important; align-items:center!important; justify-content:center!important; position:relative!important; }
    .blue-dot {
      width:12px; height:12px;
      background:var(--blue-light); border:2.5px solid #fff; border-radius:50%; z-index:5;
      box-shadow:0 0 0 4px rgba(96,165,250,.2), 0 0 16px var(--blue-light);
      animation:dotPulse 2s ease-in-out infinite;
    }
    .cross-v { position:absolute; width:1.5px; height:60px; background:rgba(96,165,250,.55); }
    .cross-h { position:absolute; height:1.5px; width:60px;  background:rgba(96,165,250,.55); }

    .leaflet-popup-content-wrapper {
      background:var(--surface); border:1px solid var(--border-hi);
      border-radius:var(--r-md); box-shadow:var(--sh-md);
      color:var(--text); font-family:var(--font); font-size:12.5px;
    }
    .leaflet-popup-tip-container .leaflet-popup-tip { background:var(--surface); }
    .leaflet-popup-close-button { color:var(--text-dim)!important; font-size:16px!important; }
    .p-nav, .p-del {
      display:block; width:100%; margin-top:7px; padding:7px 12px;
      border:none; border-radius:var(--r-sm); cursor:pointer;
      font-family:var(--font); font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
      transition:filter var(--t1); text-align:center;
    }
    .p-nav { background:var(--green); color:#fff; }
    .p-del { background:var(--red);   color:#fff; }
    .p-nav:hover, .p-del:hover { filter:brightness(1.2); }
    .area-label { font-size:11px; color:var(--text-mid); margin-top:3px; }

    .wms-style-force { filter:contrast(400%) brightness(50%) saturate(8) hue-rotate(320deg)!important; opacity:.9; }

    .leaflet-control-layers, .leaflet-control-geocoder, .leaflet-pm-toolbar { display:none!important; }

    .leaflet-container .leaflet-pm-hintMarker { display: none !important; }

    #splash {
      position:fixed; inset:0; z-index:9999; background:var(--bg);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      transition:opacity var(--t3) var(--ease);
    }
    #splash.gone { opacity:0; pointer-events:none; }
    .splash-logo { font-size:28px; font-weight:800; letter-spacing:-.5px; }
    .splash-logo span { color:var(--accent); }
    .splash-sub  { font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
    .spin-ring {
      width:44px; height:44px;
      border:3px solid var(--border); border-top-color:var(--accent);
      border-radius:50%; animation:spin .7s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>

<body class="show-ui">

<div id="splash">
  <p class="splash-logo">Sodestus <span>GIS</span></p>
  <div class="spin-ring"></div>
  <p class="splash-sub">Loading map engine…</p>
</div>

<div id="map"></div>
<div id="zoomBox"></div>

<!-- Search bar ഇപ്പോൾ ടോപ്പിലേക്ക് (top: 8px) കൃത്യമായി ക്രമീകരിച്ചു -->
<div class="searchbar collapsed" id="searchBar">
  <button id="searchToggleBtn" title="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
  <input type="text" id="searchInput" placeholder="Search place or lat, lng…" autocomplete="off" />
  <span id="searchPhoneInfo" style="display:flex;align-items:center;gap:5px;flex-shrink:0;padding:0 4px;border-left:1px solid var(--border);margin-left:2px;">
    <i class="fa-solid fa-phone" style="color:var(--accent);font-size:11px;"></i>
    <span style="font-family:var(--mono);font-size:10px;color:var(--accent);font-weight:500;white-space:nowrap;">9400849115</span>
  </span>
  <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
</div>

<!-- ഹഡ് ബാഡ്ജ് (HUD Badge Ribbon) റിമൂവ് ചെയ്തു -->

<div class="ribbon" id="ribbon">
  <!-- 1. LIVE GPS -->
  <button class="rb" id="gpsBtn" data-tip="Live GPS" onclick="GIS.GPS.toggle()"><i class="fa-solid fa-crosshairs"></i></button>
  
  <div class="rdiv"></div>

  <!-- 2. DRAWING TOOL MAIN TAB -->
  <button class="rb" id="drawMainGroupBtn" data-tip="Drawing Tools" onclick="GIS.UI.expand('drawGroup')"><i class="fa-solid fa-pen-ruler"></i></button>
  
  <div class="sub-group" id="group-drawGroup">
    <button class="mb" id="markerBtn"  title="Save Note (Location Pin)" onclick="GIS.Draw.trigger('Marker')"> <i class="fa-solid fa-location-dot"></i></button>
    <button class="mb" id="lineBtn"    title="Draw Line"    onclick="GIS.Draw.trigger('Line')">   <i class="fa-solid fa-file-signature"></i></button>
    <button class="mb" id="polygonBtn" title="Draw Polygon" onclick="GIS.Draw.trigger('Polygon')"><i class="fa-solid fa-draw-polygon"></i></button>
    <button class="mb" id="routeModeBtn" title="Route Planner" onclick="GIS.Draw.toggleRouteMode()"><i class="fa-solid fa-route"></i></button>
    <button class="mb" id="editBtn"    title="Edit Shapes"  onclick="GIS.Draw.toggleEdit()"><i class="fa-solid fa-pen-to-square"></i></button>
    <button class="mb" id="eraseModeBtn" title="Touch Erase" onclick="GIS.Draw.toggleErase()"><i class="fa-solid fa-eraser"></i></button>
    <button class="mb" title="Clear All"  onclick="GIS.Draw.clearAll()"  style="color:var(--red)"><i class="fa-solid fa-trash-can"></i></button>
  </div>

  <div class="rdiv"></div>

  <!-- 3. LAYER TAB -->
  <button class="rb" id="layerBtn" data-tip="Layers" onclick="GIS.UI.expand('layers')"><i class="fa-solid fa-layer-group"></i></button>
  <div class="sub-group" id="group-layers">
    <button class="mb" title="Hybrid"       onclick="GIS.Layers.setBase('hybrid')" style="font-size:9px;font-weight:800;letter-spacing:.5px">HYB</button>
    <button class="mb" title="Road"         onclick="GIS.Layers.setBase('road')"   style="font-size:9px;font-weight:800;letter-spacing:.5px">ROAD</button>
    <button class="mb" title="OpenStreetMap"onclick="GIS.Layers.setBase('osm')"    style="font-size:9px;font-weight:800;letter-spacing:.5px">OSM</button>
    <div style="width:100%;height:1px;background:var(--border);margin:3px 0"></div>
    <button class="mb" id="btnVil" title="Village WMS"    onclick="GIS.Layers.toggleWms('village')"   style="font-size:9px;font-weight:800">VIL</button>
    <button class="mb" id="btnCad" title="Cadastral WMS"  onclick="GIS.Layers.toggleWms('cadastral')" style="background:var(--amber);color:#000;font-size:9px;font-weight:800">CAD</button>
  </div>

  <div class="rdiv"></div>

  <!-- 4. FMB UPLOAD BUTTON -->
  <label class="rb on-green" id="fmbLoadLabel" data-tip="Load FMB" title="Load FMB Image/PDF">
    <i class="fa-solid fa-image"></i>
    <input type="file" id="uploadFMB" accept=".jpg,.jpeg,.png,.pdf" style="display:none" />
  </label>

  <div id="fmbTools" style="display:none;flex-direction:column;align-items:center;gap:5px;width:100%">
    <div class="rdiv"></div>
    <button class="rb" id="touchMoveBtn" data-tip="Touch Move" onclick="GIS.FMB.toggleTouch()"><i class="fa-solid fa-hand-pointer"></i></button>
    <div class="rdiv"></div>

    <button class="rb" id="mainMoveBtn" data-tip="Move FMB" onclick="GIS.UI.expand('move')"><i class="fa-solid fa-arrows-up-down-left-right"></i></button>
    <div class="sub-group" id="group-move">
      <button class="mb" onclick="GIS.FMB.adjust('up')">↑</button>
      <div class="mb-row">
        <button class="mb" onclick="GIS.FMB.adjust('left')">←</button>
        <button class="mb" onclick="GIS.FMB.adjust('right')">→</button>
      </div>
      <button class="mb" onclick="GIS.FMB.adjust('down')">↓</button>
    </div>

    <button class="rb" id="mainScaleBtn" data-tip="Resize FMB" onclick="GIS.UI.expand('scale')"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button>
    <div class="sub-group" id="group-scale">
      <button class="mb" onclick="GIS.FMB.adjust('zoomin')"><i class="fa-solid fa-plus"></i></button>
      <button class="mb" onclick="GIS.FMB.adjust('zoomout')"><i class="fa-solid fa-minus"></i></button>
    </div>

    <button class="rb" id="mainRotateBtn" data-tip="Rotate FMB" onclick="GIS.UI.expand('rotate')"><i class="fa-solid fa-rotate"></i></button>
    <div class="sub-group" id="group-rotate">
      <button class="mb" onclick="GIS.FMB.adjust('rotL')"><i class="fa-solid fa-rotate-left"></i></button>
      <button class="mb" onclick="GIS.FMB.adjust('rotR')"><i class="fa-solid fa-rotate-right"></i></button>
    </div>

    <button class="rb" id="mainOpacityBtn" data-tip="Opacity" onclick="GIS.UI.expand('opacity')"><i class="fa-solid fa-circle-half-stroke"></i></button>
    <div class="sub-group" id="group-opacity">
      <div class="slider-wrap">
        <input type="range" id="fmbOpacity" class="vslider" min="0.1" max="1" step="0.05" value="0.6" />
      </div>
    </div>

    <div class="rdiv"></div>
    <button class="rb on-red" data-tip="Remove FMB" onclick="GIS.FMB.remove()"><i class="fa-solid fa-trash"></i></button>
  </div>
</div>

  <button class="btn btn-export" onclick="GIS.IO.exportKML()"><i class="fa-solid fa-file-export"></i>Save KML</button>
  <button class="btn btn-export" onclick="GIS.IO.exportKMZ()"><i class="fa-solid fa-file-zipper"></i>Save KMZ</button>
  <button class="btn btn-export" onclick="GIS.IO.exportGeoImage()"><i class="fa-solid fa-image"></i>Geo-JPEG</button>
  <label class="btn btn-import">
    <i class="fa-solid fa-file-import"></i>Load KML
    <input type="file" id="uploadFile" accept=".kml,.json,.geojson" style="display:none" />
  </label>
</div>

<div id="toast-root"></div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Confirm</div>
    <div class="modal-body"  id="modalBody">Are you sure?</div>
    <div class="modal-actions">
      <button class="modal-btn cancel"  id="modalCancel">Cancel</button>
      <button class="modal-btn confirm" id="modalConfirm">Confirm</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/@mapbox/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

<script>
'use strict';

(() => {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

  const STORAGE_KEY   = 'murali_gis_v11';
  const BHUVAN_URL    = 'https://bhuvan-panchayat3.nrsc.gov.in/geoserver/gwc/service/wms';
  const KSREC_URL     = 'https://ksrec.in/geoserver/Kerala/wms';
  const DEFAULT_VIEW  = { lat: 11.196, lng: 76.227, zoom: 16 };
  const TOOL_GROUPS   = ['drawGroup','move','scale','rotate','opacity','layers','erase'];

  /* ── TOAST ── */
  const Toast = (() => {
    const root = document.getElementById('toast-root');
    const ICONS = { info:'fa-circle-info', ok:'fa-circle-check', warn:'fa-triangle-exclamation', error:'fa-circle-xmark' };
    return {
      show(msg, type = 'info', dur = 4000) {
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.innerHTML = `<i class="fa-solid ${ICONS[type]} toast-icon"></i><span class="toast-msg">${msg}</span>`;
        root.appendChild(el);
        setTimeout(() => { el.classList.add('out'); el.addEventListener('animationend', () => el.remove()); }, dur);
      }
    };
  })();

  /* ── MODAL ── */
  const Modal = (() => {
    const bd = document.getElementById('modalBackdrop');
    const title = document.getElementById('modalTitle');
    const body  = document.getElementById('modalBody');
    const btnOK = document.getElementById('modalConfirm');
    const btnCancel = document.getElementById('modalCancel');
    let _resolve;
    btnOK.addEventListener('click',     () => { bd.classList.remove('open'); _resolve(true);  });
    btnCancel.addEventListener('click', () => { bd.classList.remove('open'); _resolve(false); });
    return {
      confirm(t, b) {
        title.textContent = t || 'Confirm'; body.textContent = b || 'Are you sure?';
        bd.classList.add('open');
        return new Promise(r => _resolve = r);
      }
    };
  })();

  /* ── AUTO-HIDE ── */
  let uiTimer = null;
  const showUI = () => {
    document.body.classList.add('show-ui');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => {
      if (!State.drawing && !State.touchMove && !State.eraseMode && !State.editMode)
        document.body.classList.remove('show-ui');
    }, 5500);
  };

  /* ── STATE ── */
  const State = { drawing: false, eraseMode: false, editMode: false, touchMove: false, draggingVertex: false, routeMode: false, userLatLng: null };

  /* ── MAP INIT ── */
  const tileSrc = {
    hybrid: 'https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
    road:   'https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
    osm:    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  };
  const googleSubs = { maxZoom:22, subdomains:['mt0','mt1','mt2','mt3'] };
  const baseLayers = {
    hybrid: L.tileLayer(tileSrc.hybrid, googleSubs),
    road:   L.tileLayer(tileSrc.road,   googleSubs),
    osm:    L.tileLayer(tileSrc.osm,    { maxZoom:22 }),
  };

  const map = L.map('map', {
    center:[DEFAULT_VIEW.lat, DEFAULT_VIEW.lng], zoom:DEFAULT_VIEW.zoom,
    layers:[baseLayers.hybrid], zoomControl:false, tap:false,
  });

  map.pm.setGlobalOptions({ 
    snappable:true, 
    snapDistance:25, 
    snapMiddle:true, 
    layerGroup:map,
    hintMarkerStyle: { opacity: 0, fillOpacity: 0 },
    templineStyle: { color: '#ff69b4' }
  });

  map.createPane('cadastralPane');
  Object.assign(map.getPane('cadastralPane').style, { zIndex:'600', pointerEvents:'none' });

  const WMS_BASE = { format:'image/png', transparent:true, maxZoom:22, tileSize:512, zoomOffset:-1, pane:'cadastralPane' };
  const wmsLayers = {
    village:   L.tileLayer.wms(BHUVAN_URL, { ...WMS_BASE, layers:'v3:village',    className:'wms-style-force' }),
    cadastral: L.tileLayer.wms(KSREC_URL, { ...WMS_BASE, layers:'Kerala:Cadastry_Kerala' }),
  };
  
  map.addLayer(wmsLayers.cadastral);

  /* ── MINI MAP ── */
  const baseLayersMini = {
    hybrid: L.tileLayer(tileSrc.hybrid, googleSubs),
    road:   L.tileLayer(tileSrc.road,   googleSubs),
    osm:    L.tileLayer(tileSrc.osm,    { maxZoom:22 }),
  };

  const mini = L.map('zoomBox', {
    attributionControl:false, zoomControl:false,
    dragging:false, touchZoom:false, scrollWheelZoom:false, doubleClickZoom:false, boxZoom:false,
    layers:[baseLayersMini.hybrid]
  });
  mini.createPane('miniCadastral');
  Object.assign(mini.getPane('miniCadastral').style, { zIndex:'600', pointerEvents:'none' });

  const miniWms = {
    village:   L.tileLayer.wms(BHUVAN_URL, { ...WMS_BASE, pane:'miniCadastral', layers:'v3:village',    className:'wms-style-force' }),
    cadastral: L.tileLayer.wms(KSREC_URL, { ...WMS_BASE, pane:'miniCadastral', layers:'Kerala:Cadastry_Kerala' }),
  };
  
  mini.addLayer(miniWms.cadastral);

  const drawnItems     = new L.FeatureGroup().addTo(map);
  const drawnItemsMini = new L.FeatureGroup().addTo(mini);
  const vectorSync     = {};
  let routeLayer       = null;
  let routeLayerMini   = null;

  /* ── MAGNIFIER ── */
  const showMagnifier = () => {
    document.getElementById('zoomBox').classList.add('active');
  };
  const hideMagnifier = () => {
    if (!State.draggingVertex && !State.drawing) {
      document.getElementById('zoomBox').classList.remove('active');
    }
  };

  const mapContainer = map.getContainer();
  const updateMagnifierPosition = (domEvent) => {
    if (State.draggingVertex || State.drawing) {
      const touch = domEvent.touches ? domEvent.touches[0] : domEvent;
      if (!touch) return;
      const rect = mapContainer.getBoundingClientRect();
      const containerPoint = L.point(
        touch.clientX - rect.left,
        touch.clientY - rect.top
      );
      const latlng = map.containerPointToLatLng(containerPoint);
      mini.setView(latlng, map.getZoom() + 4);
    }
  };

  mapContainer.addEventListener('touchstart', (e) => {
    if (State.draggingVertex || State.drawing) { showMagnifier(); updateMagnifierPosition(e); }
  }, { passive: true });

  mapContainer.addEventListener('touchmove', (e) => {
    if (State.draggingVertex || State.drawing) { showMagnifier(); updateMagnifierPosition(e); }
  }, { passive: true });

  mapContainer.addEventListener('touchend',   () => { hideMagnifier(); }, { passive: true });
  mapContainer.addEventListener('touchcancel',() => { hideMagnifier(); }, { passive: true });

  mapContainer.addEventListener('mousedown', (e) => {
    if (State.draggingVertex || State.drawing) { showMagnifier(); updateMagnifierPosition(e); }
  });
  mapContainer.addEventListener('mousemove', (e) => {
    if (State.draggingVertex || State.drawing) { updateMagnifierPosition(e); }
  });
  mapContainer.addEventListener('mouseup', () => { hideMagnifier(); });

  map.on('click', e => {
    if (State.routeMode) { Draw.drawShortestRoute(e.latlng.lat, e.latlng.lng); }
    if (State.drawing)   { mini.setView(e.latlng, map.getZoom() + 4); }
  });
  map.on('dragstart zoomstart', () => {
    if (!State.drawing && !State.touchMove && !State.eraseMode && !State.editMode)
      document.body.classList.remove('show-ui');
  });
  document.addEventListener('mousemove', showUI);
  document.addEventListener('touchstart', showUI);
  document.addEventListener('keydown', showUI);

  /* ════════════════════════════════════
     MODULE: LAYERS
  ════════════════════════════════════ */
  const Layers = {
    _current: 'hybrid',
    setBase(key) {
      Object.values(baseLayers).forEach(l => map.removeLayer(l));
      map.addLayer(baseLayers[key]);
      Object.values(baseLayersMini).forEach(l => mini.removeLayer(l));
      mini.addLayer(baseLayersMini[key]);
      this._current = key;
      Toast.show(`Switched to <b>${key}</b> layer`, 'info', 2500);
    },
    toggleWms(type) {
      const layer = wmsLayers[type], mLayer = miniWms[type];
      const btnId = type === 'village' ? 'btnVil' : 'btnCad';
      const btn   = document.getElementById(btnId);
      if (map.hasLayer(layer)) {
        map.removeLayer(layer); mini.removeLayer(mLayer);
        btn.style.cssText = '';
        Toast.show(`<b>${type}</b> WMS hidden`, 'info', 2000);
      } else {
        map.addLayer(layer); mini.addLayer(mLayer);
        btn.style.cssText = 'background:var(--amber);color:#000';
        Toast.show(`<b>${type}</b> WMS active`, 'ok', 2000);
      }
    },
  };

  /* ── MODULE: SEARCH ── */
  const Search = (() => {
    let marker = null, markerMini = null;
    const execute = async () => {
      const raw = document.getElementById('searchInput').value.trim();
      if (!raw) return;
      if (marker) { map.removeLayer(marker); marker = null; }
      if (markerMini) { mini.removeLayer(markerMini); markerMini = null; }

      const parts = raw.split(/[\s,]+/);
      if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
        const [lat, lng] = parts.map(Number);
        map.setView([lat, lng], 17);
        marker = L.marker([lat, lng]).addTo(map).bindPopup(`<b>Coordinates</b><br><code>${lat.toFixed(6)}, ${lng.toFixed(6)}</code>`).openPopup();
        markerMini = L.marker([lat, lng], { interactive: false }).addTo(mini);
        return;
      }
      try {
        const res  = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(raw)}`);
        const data = await res.json();
        if (!data.length) { Toast.show('Place not found', 'warn'); return; }
        const { lat, lon, display_name } = data[0];
        map.setView([+lat, +lon], 15);
        marker = L.marker([+lat, +lon]).addTo(map).bindPopup(`<b>${display_name}</b>`).openPopup();
        markerMini = L.marker([+lat, +lon], { interactive: false }).addTo(mini);
      } catch { Toast.show('Search error — check internet', 'error'); }
    };
    document.getElementById('searchBtn').addEventListener('click', execute);
    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') execute(); });

    const bar = document.getElementById('searchBar');
    const input = document.getElementById('searchInput');
    document.getElementById('searchToggleBtn').addEventListener('click', () => {
      bar.classList.remove('collapsed');
      setTimeout(() => input.focus(), 50);
    });
    document.addEventListener('click', (e) => {
      if (!bar.contains(e.target) && !bar.classList.contains('collapsed') && !input.value.trim()) {
        bar.classList.add('collapsed');
      }
    });

    return { execute };
  })();

  /* ════════════════════════════════════
     ADVANCED HIGH-ACCURACY GPS ENGINE
  ════════════════════════════════════ */
  const GPS = (() => {
    let active = false;
    let watchId = null;
    let userMarker = null, ring = null;
    let userMarkerMini = null, ringMini = null;
    
    const crossIcon = L.divIcon({
      className:'blue-dot-container',
      html:'<div class="cross-v"></div><div class="cross-h"></div><div class="blue-dot"></div>',
      iconSize:[60,60], iconAnchor:[30,30],
    });

    // ലൊക്കേഷൻ ലഭിക്കുമ്പോൾ എക്സിക്യൂട്ട് ചെയ്യുന്ന ഫങ്ക്ഷൻ (High Accuracy)
    const onLocationUpdate = (position) => {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const accuracy = position.coords.accuracy;
      const latlng = L.latLng(lat, lng);
      
      State.userLatLng = latlng;
      
      // ലൊക്കേഷൻ മാറിയാൽ സ്മൂത്ത് ആയി പാൻ ചെയ്യും
      map.panTo(latlng);

      if (!userMarker) {
        userMarker = L.marker(latlng, { icon:crossIcon }).addTo(map);
        ring = L.circle(latlng, { radius:accuracy, color:'#60a5fa', weight:1, opacity:.3, fillOpacity:.04 }).addTo(map);
      } else {
        userMarker.setLatLng(latlng);
        ring.setLatLng(latlng).setRadius(accuracy);
      }

      if (!userMarkerMini) {
        userMarkerMini = L.marker(latlng, { icon:crossIcon }).addTo(mini);
        ringMini = L.circle(latlng, { radius:accuracy, color:'#60a5fa', weight:1, opacity:.3, fillOpacity:.04 }).addTo(mini);
      } else {
        userMarkerMini.setLatLng(latlng);
        ringMini.setLatLng(latlng).setRadius(accuracy);
      }
    };

    const onLocationError = (error) => {
      console.warn("GPS Tracking Error/Fallback Code:", error.message);
      // Timeout അല്ലെങ്കിൽ സിഗ്നൽ ലോസ് വന്നാൽ വീണ്ടും കണക്ട് ചെയ്യാൻ ശ്രമിക്കും
      if (active && error.code === error.TIMEOUT) {
        restartTracking();
      } else if (error.code === error.PERMISSION_DENIED) {
        Toast.show('ലൊക്കേഷൻ പെർമിഷൻ നിരസിക്കപ്പെട്ടു.', 'error');
        stop();
      }
    };

    const start = () => {
      if (navigator.geolocation) {
        // പരമാവധി ആക്യുറേറ്റ് ലൊക്കേഷൻ ലൈവ് ആയി ട്രാക്ക് ചെയ്യാനുള്ള അഡ്വാൻസ്ഡ് കോൺഫിഗറേഷൻ
        const gpsOptions = {
          enableHighAccuracy: true, // ഹാർഡ്‌വെയർ ജിപിഎസ് നിർബന്ധമാക്കുന്നു
          timeout: 10000,           // 10 സെക്കൻഡിൽ റെസ്പോൺസ് വരണം
          maximumAge: 0             // പഴയ കാഷെ ഡാറ്റ പൂർണ്ണമായി ഒഴിവാക്കുന്നു
        };
        watchId = navigator.geolocation.watchPosition(onLocationUpdate, onLocationError, gpsOptions);
      } else {
        Toast.show('നിങ്ങളുടെ ഉപകരണത്തിൽ GPS ലഭ്യമല്ല.', 'error');
      }
    };

    const stop = () => {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      if (userMarker)     { map.removeLayer(userMarker); userMarker = null; }
      if (ring)           { map.removeLayer(ring); ring = null; }
      if (userMarkerMini) { mini.removeLayer(userMarkerMini); userMarkerMini = null; }
      if (ringMini)       { mini.removeLayer(ringMini); ringMini = null; }
    };

    const restartTracking = () => {
      if (!active) return;
      navigator.geolocation.clearWatch(watchId);
      start();
    };

    const toggle = () => {
      const btn = document.getElementById('gpsBtn');
      if (!active) {
        active = true;
        btn.classList.add('on-blue');
        start();
        Toast.show('ഹൈ-ആക്യുറസി <b>GPS ട്രാക്കിംഗ്</b> ആരംഭിച്ചു', 'ok');
      } else {
        active = false;
        btn.classList.remove('on-blue');
        stop();
        Toast.show('GPS ട്രാക്കിംഗ് <b>നിർത്തി</b>', 'info');
      }
    };

    return { toggle, onLocationSuccess: (lat, lng, acc) => onLocationUpdate({ coords: { latitude: lat, longitude: lng, accuracy: acc } }), onLocationFailure: (msg) => onLocationError({ message: msg, code: 0 }) };
  })();

  window.onNativeLocationFound = function(lat, lng, accuracy) {
    if (window.GIS && window.GIS.GPS && window.GIS.GPS.onLocationSuccess) {
      window.GIS.GPS.onLocationSuccess(lat, lng, accuracy);
    }
  };
  window.onNativeLocationError = function(message) {
    if (window.GIS && window.GIS.GPS && window.GIS.GPS.onLocationFailure) {
      window.GIS.GPS.onLocationFailure(message);
    }
  };

  /* ── MODULE: DRAW & EDIT ── */
  const Draw = (() => {
    const savedNotes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const pinGroup     = L.layerGroup().addTo(map);
    const pinGroupMini = L.layerGroup().addTo(mini);

    map.pm.addControls({ drawMarker:false, drawPolygon:false, drawPolyline:false, editMode:false, dragMode:false, cutPolygon:false, removalMode:false });

    const renderNotes = () => {
      pinGroup.clearLayers();
      pinGroupMini.clearLayers();
      savedNotes.forEach((p, i) => {
        L.marker([p.lat, p.lng]).addTo(pinGroup).bindPopup(
          `<b>📍 Note</b><br>${p.text}
           <button class="p-nav" style="background:var(--blue); color:#fff; border:1px solid #1d4ed8; margin-top:6px;" onclick="GIS.Draw.drawShortestRoute(${p.lat}, ${p.lng})"><i class='fa-solid fa-route'></i> Show Route</button>
           <button class="p-del" onclick="GIS.Draw._deleteNote(${i})"><i class='fa-solid fa-trash'></i> Delete</button>`
        );
        L.marker([p.lat, p.lng]).addTo(pinGroupMini);
      });
    };
    renderNotes();

    const clearHighlights = () =>
      ['lineBtn','polygonBtn','markerBtn'].forEach(id => {
        document.getElementById(id)?.classList.remove('on-accent');
      });

    const trigger = (toolType) => {
      if (State.editMode)  toggleEdit();
      if (State.eraseMode) toggleErase();
      const wasActive = map.pm.GlobalDrawMode === toolType;
      clearHighlights();
      document.querySelectorAll('#group-drawGroup .mb').forEach(b => b.style.cssText = '');
      
      if (wasActive) { map.pm.disableDraw(); }
      else {
        map.pm.enableDraw(toolType, { hintMarkerStyle: { opacity: 0, fillOpacity: 0 } });
        const id = { Line:'lineBtn', Polygon:'polygonBtn', Marker:'markerBtn' }[toolType];
        document.getElementById(id).style.cssText = 'background:var(--accent);color:#fff';
      }
      setTimeout(() => UI.syncMinimize(), 50);
    };

    map.on('pm:globaldrawmodetoggled', e => { if (!e.enabled) clearHighlights(); });

    let workingLayerMini = null;
    map.on('pm:drawstart', (e) => {
      State.drawing = true;
      document.body.classList.add('show-ui');
      document.getElementById('zoomBox').classList.add('active');

      const wl = e.workingLayer;
      if (wl) {
        if (workingLayerMini) { mini.removeLayer(workingLayerMini); workingLayerMini = null; }
        const shape = map.pm.Draw.getActiveShape();
        const style = { color: '#ff69b4', weight: 4, dashArray: '5, 5' };
        if (shape === 'Polygon' || shape === 'Rectangle') {
          workingLayerMini = L.polygon([], style).addTo(mini);
        } else if (shape === 'Line') {
          workingLayerMini = L.polyline([], style).addTo(mini);
        }
        const syncWorkingLayer = () => {
          if (workingLayerMini && wl.getLatLngs) {
            try { workingLayerMini.setLatLngs(wl.getLatLngs()); } catch (err) { console.warn("mini sync", err); }
          }
        };

        wl.on('pm:vertexadded', syncWorkingLayer);
        wl.on('pm:vertexremoved', syncWorkingLayer);
        map.on('mousemove', syncWorkingLayer);
      }
    });

    map.on('pm:drawend', () => {
      State.drawing = false;
      showUI();
      document.getElementById('zoomBox').classList.remove('active');
      if (workingLayerMini) { mini.removeLayer(workingLayerMini); workingLayerMini = null; }
    });

    map.on('mousemove', e => {
      if (State.draggingVertex || State.drawing) { mini.setView(e.latlng, map.getZoom() + 4); }
    });

    map.on('pm:snap', e => {
      if (State.drawing) { mini.setView(e.latlng, map.getZoom() + 4); }
    });

    map.on('pm:create', e => {
      const { layer, shape } = e;

      if (shape === 'Marker') {
        const ll  = layer.getLatLng();
        const txt = prompt('Save Note:');
        if (txt) {
          savedNotes.push({ lat:ll.lat, lng:ll.lng, text:txt });
          localStorage.setItem(STORAGE_KEY, JSON.stringify(savedNotes));
          renderNotes();
          Toast.show('Note saved', 'ok', 2500);
        }
        map.removeLayer(layer); 
        document.getElementById('markerBtn').style.cssText = '';
        return;
      }

      drawnItems.addLayer(layer);

      if (shape === 'Polygon' || shape === 'Rectangle') {
        layer.setStyle({
          color:       '#ff69b4',
          fillColor:   '#ff69b4',
          fillOpacity: 0.15,
          weight:      2.5
        });
      }

      layer.on('pm:markerdragstart', (ev) => {
        State.draggingVertex = true;
        document.getElementById('zoomBox').classList.add('active');
        document.body.classList.add('show-ui');
        if (ev.marker) mini.setView(ev.marker.getLatLng(), map.getZoom() + 4);
      });

      layer.on('pm:markerdrag', (ev) => {
        if (State.draggingVertex) {
          if (ev.marker) mini.setView(ev.marker.getLatLng(), map.getZoom() + 4);
          const ml = drawnItemsMini.getLayer(vectorSync[L.stamp(layer)]);
          if (ml && layer.getLatLngs) { ml.setLatLngs(layer.getLatLngs()); }
        }
      });

      layer.on('pm:markerdragend', () => {
        State.draggingVertex = false;
        document.getElementById('zoomBox').classList.remove('active');
      });

      if (shape === 'Polygon' || shape === 'Rectangle') {
        const updateAreaPopup = () => {
          const area = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
          const popupContent = `<b>Area</b>
             <p class="area-label">${(area * 0.000247105).toFixed(3)} ac · ${(area * 0.0247105).toFixed(2)} cents</p>`;
          if (layer.getPopup()) { layer.setPopupContent(popupContent); }
          else { layer.bindPopup(popupContent).openPopup(); }
        };
        updateAreaPopup();
        layer.on('pm:edit',          updateAreaPopup);
        layer.on('pm:markerdragend', updateAreaPopup);
        layer.on('pm:vertexadded',   updateAreaPopup);
        layer.on('pm:vertexremoved', updateAreaPopup);
      }

      const origId = L.stamp(layer);
      const style  = {
        color:       shape === 'Line' ? (layer.options.color || '#3388ff') : '#ff69b4',
        fillColor:   '#ff69b4',
        fillOpacity: 0.15,
        weight:      layer.options.weight || 2.5
      };
      let miniL;
      if (shape === 'Line')
        miniL = L.polyline(layer.getLatLngs(), { color: layer.options.color || '#3388ff', weight: layer.options.weight || 3 }).addTo(drawnItemsMini);
      else if (shape === 'Polygon' || shape === 'Rectangle')
        miniL = L.polygon(layer.getLatLngs(), style).addTo(drawnItemsMini);
      if (miniL) {
        vectorSync[origId] = L.stamp(miniL);
        layer.on('pm:edit', () => {
          const ml = drawnItemsMini.getLayer(vectorSync[L.stamp(layer)]);
          if (ml) ml.setLatLngs(layer.getLatLngs());
        });
      }
      
      document.getElementById('lineBtn').style.cssText = '';
      document.getElementById('polygonBtn').style.cssText = '';
    });

    drawnItems.on('layerremove', e => {
      const oid = L.stamp(e.layer);
      const ml  = drawnItemsMini.getLayer(vectorSync[oid]);
      if (ml) drawnItemsMini.removeLayer(ml);
      delete vectorSync[oid];
    });

    const toggleErase = () => {
      if (map.pm.GlobalDrawMode) map.pm.disableDraw();
      if (State.editMode) toggleEdit();
      map.pm.toggleGlobalRemovalMode();
      State.eraseMode = map.pm.globalRemovalModeEnabled();
      const btn = document.getElementById('eraseModeBtn');
      if (State.eraseMode) {
        btn.style.cssText = 'background:var(--accent);color:#fff';
        document.body.classList.add('show-ui');
        Toast.show('Erase mode <b>ON</b> — tap a shape to delete it.', 'warn', 4000);
      } else { btn.style.cssText = ''; showUI(); }
      setTimeout(() => UI.syncMinimize(), 50);
    };

    const toggleEdit = () => {
      if (map.pm.GlobalDrawMode) map.pm.disableDraw();
      if (State.eraseMode) toggleErase();
      map.pm.toggleGlobalEditMode();
      State.editMode = map.pm.globalEditModeEnabled();
      const btn = document.getElementById('editBtn');
      if (State.editMode) {
        btn.style.cssText = 'background:var(--accent);color:#fff';
        document.body.classList.add('show-ui');
        Toast.show('Edit mode <b>ON</b> — drag node handles to reshape.', 'info', 4000);
      } else { btn.style.cssText = ''; showUI(); }
      setTimeout(() => UI.syncMinimize(), 50);
    };

    let routeLayerMini = null;

    const clearAll = async () => {
      const ok = await Modal.confirm('Clear all drawings?', 'This will remove all lines, polygons and shapes. This cannot be undone.');
      if (!ok) return;
      drawnItems.clearLayers(); drawnItemsMini.clearLayers();
      Object.keys(vectorSync).forEach(k => delete vectorSync[k]);
      map.eachLayer(l => { if (l.pm && l instanceof L.Path) map.removeLayer(l); });
      if (State.eraseMode) toggleErase();
      if (State.editMode)  toggleEdit();
      if (routeLayerMini) { mini.removeLayer(routeLayerMini); routeLayerMini = null; }
      Toast.show('All drawings cleared', 'ok');
    };

    const _deleteNote = i => {
      savedNotes.splice(i, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(savedNotes));
      renderNotes();
      Toast.show('Note deleted', 'ok', 2500);
    };

    const toggleRouteMode = () => {
      if (map.pm.GlobalDrawMode) map.pm.disableDraw();
      if (State.editMode) toggleEdit();
      if (State.eraseMode) toggleErase();
      State.routeMode = !State.routeMode;
      const btn = document.getElementById('routeModeBtn');
      if (State.routeMode) {
        btn.style.cssText = 'background:var(--accent);color:#fff';
        Toast.show('Route Planner <b>ACTIVE</b> — Tap anywhere on the map.', 'info', 4000);
      } else {
        btn.style.cssText = '';
        if (routeLayer)     { map.removeLayer(routeLayer); routeLayer = null; }
        if (routeLayerMini) { mini.removeLayer(routeLayerMini); routeLayerMini = null; }
      }
      setTimeout(() => UI.syncMinimize(), 50);
    };

    const drawShortestRoute = async (destLat, destLng) => {
      if (routeLayer)     { map.removeLayer(routeLayer); routeLayer = null; }
      if (routeLayerMini) { mini.removeLayer(routeLayerMini); routeLayerMini = null; }

      let startLoc = State.userLatLng;
      if (!startLoc) {
        if (!document.getElementById('gpsBtn').classList.contains('on-blue')) { GPS.toggle(); }
        startLoc = map.getCenter();
        Toast.show('Calculating driving line from Map Center…', 'info', 2000);
      }

      const url = `https://router.project-osrm.org/route/v1/driving/${startLoc.lng},${startLoc.lat};${destLng},${destLat}?overview=full&geometries=geojson`;
      try {
        const res  = await fetch(url);
        const data = await res.json();
        if (!data.routes || data.routes.length === 0) throw new Error('No driving path possible');

        const route       = data.routes[0];
        const coordinates = route.geometry.coordinates.map(c => [c[1], c[0]]);

        const mkRoute = () => L.featureGroup([
          L.polyline(coordinates, { color:'#ffffff', weight:7, opacity:.9, lineCap:'round', lineJoin:'round' }),
          L.polyline(coordinates, { color:'#1d4ed8', weight:4, opacity:1,  lineCap:'round', lineJoin:'round' }),
        ]);

        routeLayer     = mkRoute().addTo(map);
        routeLayerMini = mkRoute().addTo(mini);

        map.fitBounds(routeLayer.getBounds(), { padding:[50,50] });

        const rawDist = route.distance / 1000;
        const rawDur  = route.duration / 60;
        Toast.show(`<b>Driving Route Found</b><br><i class="fa-solid fa-road"></i> Distance: ${rawDist.toFixed(2)} km<br><i class="fa-solid fa-clock"></i> Duration: ${Math.round(rawDur)} mins`, 'ok', 6000);
      } catch (err) {
        Toast.show('Shortest Path routing failed — check connection.', 'error');
        console.error(err);
      }
    };

    return { trigger, toggleErase, toggleEdit, clearAll, _deleteNote, toggleRouteMode, drawShortestRoute };
  })();

  /* ── MODULE: FMB ── */
  const FMB = (() => {
    let overlay = null, overlayMini = null, imgData = '';
    let lat = 0, lng = 0, w = 0.0025, h = 0.0025, angle = 0;
    let touchStart = null, pinchDist = 0, pinchCenter = null;
    let startLat = 0, startLng = 0, startW = 0, startH = 0;

    document.getElementById('uploadFMB').addEventListener('change', async e => {
      const file = e.target.files[0]; if (!file) return; e.target.value = '';
      try {
        if (file.type === 'application/pdf') {
          const buf  = await file.arrayBuffer();
          const pdf  = await pdfjsLib.getDocument(new Uint8Array(buf)).promise;
          const page = await pdf.getPage(1);
          const vp   = page.getViewport({ scale:2 });
          const cvs  = Object.assign(document.createElement('canvas'), { width:vp.width, height:vp.height });
          await page.render({ canvasContext:cvs.getContext('2d'), viewport:vp }).promise;
          imgData = cvs.toDataURL('image/png');
        } else if (file.type.startsWith('image/')) {
          imgData = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = ev => res(ev.target.result);
            r.onerror = rej;
            r.readAsDataURL(file);
          });
        } else { Toast.show('ദയവായി JPG, PNG അല്ലെങ്കിൽ PDF ഫയൽ നൽകുക', 'warn'); return; }
      } catch (err) { Toast.show(`Load error: ${err.message}`, 'error'); return; }

      const c = map.getCenter();
      lat = c.lat; lng = c.lng; angle = 0; w = 0.0025; h = 0.0025;
      render();
      
      document.getElementById('fmbTools').style.display = 'flex';
      Toast.show('FMB loaded — use toolbar to position', 'ok');
      showUI();
    });

    const render = () => {
      if (!imgData) return;
      const bounds = L.latLngBounds([lat - h/2, lng - w/2], [lat + h/2, lng + w/2]);
      if (overlay)     map.removeLayer(overlay);
      if (overlayMini) mini.removeLayer(overlayMini);

      const mkSvg = () => {
        const ns  = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(ns, 'svg');
        svg.setAttribute('xmlns', ns); svg.setAttribute('viewBox', '0 0 100 100');
        const img = document.createElementNS(ns, 'image');
        img.setAttribute('width','100'); img.setAttribute('height','100');
        img.setAttributeNS('http://www.w3.org/1999/xlink','href',imgData);
        img.setAttribute('href', imgData);
        img.setAttribute('transform', `rotate(${angle} 50 50)`);
        svg.appendChild(img); return svg;
      };

      const op = parseFloat(document.getElementById('fmbOpacity').value);
      overlay     = L.svgOverlay(mkSvg(), bounds, { pane:'overlayPane', opacity:op, interactive:false }).addTo(map);
      overlayMini = L.svgOverlay(mkSvg(), bounds, { opacity:op, interactive:false }).addTo(mini);
    };

    document.getElementById('fmbOpacity').addEventListener('input', e => {
      overlay?.setOpacity(+e.target.value);
      overlayMini?.setOpacity(+e.target.value);
      e.target.style.background = `linear-gradient(to right, var(--accent) ${e.target.value*100}%, var(--surface-3) ${e.target.value*100}%)`;
    });

    const ACTIONS = {
      up:      () => { const s = step(); lat += s; },
      down:    () => { const s = step(); lat -= s; },
      left:    () => { const s = step(); lng -= s; },
      right:   () => { const s = step(); lng += s; },
      zoomin:  () => { w *= 1.05; h *= 1.05; },
      zoomout: () => { w *= 0.95; h *= 0.95; },
      rotL:    () => { angle -= 1.5; },
      rotR:    () => { angle += 1.5; },
    };
    const step = () => 0.000015 * Math.max(1, 22 - map.getZoom());
    const adjust = action => { if (!overlay) return; ACTIONS[action]?.(); render(); };

    const remove = async () => {
      if (!overlay) return;
      const ok = await Modal.confirm('Remove FMB?', 'This will remove the loaded FMB overlay.');
      if (!ok) return;
      overlay && map.removeLayer(overlay); overlay = null;
      overlayMini && mini.removeLayer(overlayMini); overlayMini = null;
      imgData = ''; 
      
      document.getElementById('fmbTools').style.display = 'none';
      if (State.touchMove) toggleTouch();
      Toast.show('FMB removed', 'info');
      setTimeout(() => UI.syncMinimize(), 50);
    };

    const toggleTouch = () => {
      if (map.pm.GlobalDrawMode) map.pm.disableDraw();
      State.touchMove = !State.touchMove;
      const btn = document.getElementById('touchMoveBtn');
      if (State.touchMove) {
        map.dragging.disable();
        map.touchZoom.disable();
        map.scrollWheelZoom.disable();
        btn.classList.add('on-accent'); document.body.classList.add('show-ui');
        Toast.show('FMB Edit Mode: Drag to Move | Wheel to Zoom FMB only', 'info', 5000);
      } else {
        map.dragging.enable();
        map.touchZoom.enable();
        map.scrollWheelZoom.enable();
        btn.classList.remove('on-accent'); showUI();
      }
      setTimeout(() => UI.syncMinimize(), 50);
    };

    const mc = map.getContainer();
    
    mc.addEventListener('touchstart', e => {
      if (!State.touchMove || !overlay) return; e.preventDefault();
      if (e.touches.length === 1) {
        touchStart = { x:e.touches[0].clientX, y:e.touches[0].clientY };
        startLat = lat; startLng = lng;
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        pinchDist   = Math.hypot(dx, dy);
        pinchCenter = { x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2 };
        startLat = lat; startLng = lng; startW = w; startH = h;
      }
    }, { passive:false });

    mc.addEventListener('touchmove', e => {
      if (!State.touchMove || !overlay) return; e.preventDefault();
      if (e.touches.length === 1 && touchStart) {
        const dx = e.touches[0].clientX - touchStart.x;
        const dy = e.touches[0].clientY - touchStart.y;
        const p  = map.latLngToContainerPoint([startLat, startLng]);
        const nl = map.containerPointToLatLng(L.point(p.x+dx, p.y+dy));
        lat = nl.lat; lng = nl.lng;
      } else if (e.touches.length === 2 && pinchDist > 0) {
        const dx  = e.touches[0].clientX - e.touches[1].clientX;
        const dy  = e.touches[0].clientY - e.touches[1].clientY;
        const sc  = Math.hypot(dx, dy) / pinchDist;
        w = startW * sc; h = startH * sc;
        const cc  = { x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2 };
        const p   = map.latLngToContainerPoint([startLat, startLng]);
        const nl  = map.containerPointToLatLng(L.point(p.x+cc.x-pinchCenter.x, p.y+cc.y-pinchCenter.y));
        lat = nl.lat; lng = nl.lng;
      }
      render();
    }, { passive:false });

    mc.addEventListener('touchend', () => { touchStart = null; pinchDist = 0; }, { passive:false });

    let mouseStart = null;
    mc.addEventListener('mousedown', e => {
      if (!State.touchMove || !overlay) return;
      if (e.button !== 0) return; 
      e.preventDefault();
      mouseStart = { x: e.clientX, y: e.clientY };
      startLat = lat; startLng = lng;
    });

    document.addEventListener('mousemove', e => {
      if (!State.touchMove || !overlay || !mouseStart) return;
      e.preventDefault();
      const dx = e.clientX - mouseStart.x;
      const dy = e.clientY - mouseStart.y;
      const p  = map.latLngToContainerPoint([startLat, startLng]);
      const nl = map.containerPointToLatLng(L.point(p.x + dx, p.y + dy));
      lat = nl.lat; lng = nl.lng;
      render();
    });

    document.addEventListener('mouseup', () => { mouseStart = null; });

    mc.addEventListener('wheel', e => {
      if (!State.touchMove || !overlay) return;
      e.preventDefault();

      if (e.deltaY < 0) {
        w *= 1.03; h *= 1.03;
      } else {
        w *= 0.97; h *= 0.97;
      }
      render();
    }, { passive: false });

    return {
      adjust, remove, toggleTouch,
      getGeoRef: () => overlay ? { lat, lng, w, h, angle } : null,
      getImageData: () => overlay ? imgData : null,
    };
  })();

  /* ── MODULE: IO ── */
  const IO = (() => {
    const dataURLtoBlob = (dataURL) => {
      const [header, base64] = dataURL.split(',');
      const mimeMatch = header.match(/data:(.*?);base64/);
      const mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';
      const binary = atob(base64);
      const arr = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
      return { blob: new Blob([arr], { type: mime }), mime };
    };

    const mimeExt = (mime) => {
      if (mime.includes('png')) return 'png';
      return 'jpg';
    };

    const buildTracedKmlBody = () => {
      let body = '';
      drawnItems.eachLayer(l => {
        const isPolygon = l instanceof L.Polygon;
        const rawLlngs  = l.getLatLngs ? l.getLatLngs() : null;
        const pts = rawLlngs
          ? (Array.isArray(rawLlngs[0]) ? rawLlngs[0] : rawLlngs)
          : [l.getLatLng()];

        if (isPolygon) {
          const ring = [...pts, pts[0]];
          body += '<Placemark><Style><PolyStyle><color>801469ff</color><fill>1</fill><outline>1</outline></PolyStyle><LineStyle><color>ff1469ff</color><width>2</width></LineStyle></Style>';
          body += '<Polygon><outerBoundaryIs><LinearRing><coordinates>';
          ring.forEach(p => { body += `${p.lng},${p.lat},0 `; });
          body += '</coordinates></LinearRing></outerBoundaryIs></Polygon></Placemark>';
        } else {
          body += '<Placemark><LineString><coordinates>';
          pts.forEach(p => { body += `${p.lng},${p.lat},0 `; });
          body += '</coordinates></LineString></Placemark>';
        }
      });
      return body;
    };

    // KMZ export — bundles the actual FMB image inside the archive so it opens
    // pre-georeferenced in Google Earth / Google My Maps / any KMZ-compatible app.
    const exportKMZ = async () => {
      const fmbRef = FMB.getGeoRef ? FMB.getGeoRef() : null;
      if (!fmbRef) { Toast.show('ആദ്യം FMB ലോഡ് ചെയ്ത് ജിയോറഫറൻസ് ചെയ്യുക', 'warn'); return; }
      const imgData = FMB.getImageData ? FMB.getImageData() : null;
      if (!imgData) { Toast.show('FMB ഇമേജ് കണ്ടെത്താനായില്ല', 'error'); return; }
      if (typeof JSZip === 'undefined') { Toast.show('JSZip ലോഡ് ആയില്ല — ഇന്റർനെറ്റ് കണക്ഷൻ പരിശോധിക്കുക', 'error'); return; }

      Toast.show('KMZ തയ്യാറാക്കുന്നു…', 'info');

      const { blob: imgBlob, mime } = dataURLtoBlob(imgData);
      const ext = mimeExt(mime);
      const imgFileName = `files/fmb_overlay.${ext}`;

      const { lat, lng, w, h, angle } = fmbRef;
      const south = lat - h / 2, north = lat + h / 2;
      const west  = lng - w / 2, east  = lng + w / 2;

      let kml = '<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>';
      kml += `<name>Sodestus FMB Map</name>`;
      kml += `<GroundOverlay><name>FMB GeoReference</name>`;
      kml += `<Icon><href>${imgFileName}</href></Icon>`;
      kml += `<LatLonBox><north>${north.toFixed(8)}</north><south>${south.toFixed(8)}</south><east>${east.toFixed(8)}</east><west>${west.toFixed(8)}</west><rotation>${(-angle).toFixed(4)}</rotation></LatLonBox>`;
      kml += `</GroundOverlay>`;
      kml += buildTracedKmlBody();
      kml += '</Document></kml>';

      try {
        const zip = new JSZip();
        zip.file('doc.kml', kml);
        zip.file(imgFileName, imgBlob);
        const content = await zip.generateAsync({ type: 'blob' });

        const a = Object.assign(document.createElement('a'), {
          href: URL.createObjectURL(content),
          download: 'Sodestus_FMB_Map.kmz',
        });
        a.click(); URL.revokeObjectURL(a.href);
        Toast.show('KMZ എക്സ്പോർട്ട് ചെയ്തു — Google Earth / My Maps ൽ import ചെയ്യാം', 'ok');
      } catch (err) {
        Toast.show(`KMZ export പിഴവ്: ${err.message}`, 'error');
      }
    };

    // Georeferenced image export — FMB JPEG/PNG + World File (.jgw/.pgw) + .prj,
    // the standard format for QGIS / ArcGIS / AutoCAD Map and similar GIS tools.
    const exportGeoImage = async () => {
      const fmbRef = FMB.getGeoRef ? FMB.getGeoRef() : null;
      const imgData = FMB.getImageData ? FMB.getImageData() : null;
      if (!fmbRef || !imgData) { Toast.show('ആദ്യം FMB ലോഡ് ചെയ്ത് ജിയോറഫറൻസ് ചെയ്യുക', 'warn'); return; }
      if (typeof JSZip === 'undefined') { Toast.show('JSZip ലോഡ് ആയില്ല — ഇന്റർനെറ്റ് കണക്ഷൻ പരിശോധിക്കുക', 'error'); return; }

      Toast.show('Geo-JPEG തയ്യാറാക്കുന്നു…', 'info');

      try {
        const im = await new Promise((res, rej) => {
          const i = new Image();
          i.onload = () => res(i);
          i.onerror = rej;
          i.src = imgData;
        });
        const pxW = im.naturalWidth, pxH = im.naturalHeight;

        const { lat, lng, w, h, angle } = fmbRef;
        const theta = angle * Math.PI / 180;
        const A0 = w / pxW;          // deg longitude per pixel (unrotated)
        const E0 = -(h / pxH);       // deg latitude per pixel (unrotated, negative = south-going rows)
        const cosT = Math.cos(theta), sinT = Math.sin(theta);
        const ox = 0.5 - pxW / 2;    // pixel(0,0) center offset from image center, in px
        const oy = 0.5 - pxH / 2;

        // Affine world-file coefficients, accounting for on-screen rotation.
        const A =  cosT * A0;
        const D = -sinT * A0;
        const B =  sinT * E0;
        const E =  cosT * E0;
        const C = lng + cosT * ox * A0 + sinT * oy * E0;
        const F = lat + (-sinT * ox * A0 + cosT * oy * E0);

        const worldFile = [A, D, B, E, C, F].map(v => v.toFixed(12)).join('\n');
        const prj = 'GEOGCS["WGS 84",DATUM["WGS_1984",SPHEROID["WGS 84",6378137,298.257223563]],PRIMEM["Greenwich",0],UNIT["degree",0.0174532925199433]]';

        const { blob: imgBlob, mime } = dataURLtoBlob(imgData);
        const ext = mimeExt(mime);
        const worldExt = ext === 'png' ? 'pgw' : 'jgw';

        const zip = new JSZip();
        zip.file(`FMB_Georeferenced.${ext}`, imgBlob);
        zip.file(`FMB_Georeferenced.${worldExt}`, worldFile);
        zip.file(`FMB_Georeferenced.prj`, prj);

        const content = await zip.generateAsync({ type: 'blob' });
        const a = Object.assign(document.createElement('a'), {
          href: URL.createObjectURL(content),
          download: 'Sodestus_FMB_Georeferenced.zip',
        });
        a.click(); URL.revokeObjectURL(a.href);
        Toast.show('Geo-JPEG + World File എക്സ്പോർട്ട് ചെയ്തു — QGIS/ArcGIS ൽ നേരിട്ട് തുറക്കാം', 'ok');
      } catch (err) {
        Toast.show(`Export പിഴവ്: ${err.message}`, 'error');
      }
    };

    const exportKML = () => {
      let kml = '<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>';

      const fmbRef = FMB.getGeoRef ? FMB.getGeoRef() : null;
      if (fmbRef) {
        const { lat, lng, w, h, angle } = fmbRef;
        const south = lat - h / 2, north = lat + h / 2;
        const west  = lng - w / 2, east  = lng + w / 2;
        kml += `<GroundOverlay>`;
        kml += `<name>FMB GeoReference</name>`;
        kml += `<Icon><href>FMB_overlay.png</href></Icon>`;
        kml += `<LatLonBox>`;
        kml += `<north>${north.toFixed(8)}</north>`;
        kml += `<south>${south.toFixed(8)}</south>`;
        kml += `<east>${east.toFixed(8)}</east>`;
        kml += `<west>${west.toFixed(8)}</west>`;
        kml += `<rotation>${(-angle).toFixed(4)}</rotation>`;
        kml += `</LatLonBox>`;
        kml += `</GroundOverlay>`;
        const corners = [
          { name:'FMB-NW', lat:north, lng:west },
          { name:'FMB-NE', lat:north, lng:east },
          { name:'FMB-SE', lat:south, lng:east },
          { name:'FMB-SW', lat:south, lng:west },
          { name:'FMB-Center', lat:lat, lng:lng },
        ];
        corners.forEach(c => {
          kml += `<Placemark><name>${c.name}</name>`;
          kml += `<description>Lat: ${c.lat.toFixed(8)}, Lng: ${c.lng.toFixed(8)}</description>`;
          kml += `<Point><coordinates>${c.lng.toFixed(8)},${c.lat.toFixed(8)},0</coordinates></Point></Placemark>`;
        });
      }

      drawnItems.eachLayer(l => {
        const isPolygon = l instanceof L.Polygon;
        const rawLlngs  = l.getLatLngs ? l.getLatLngs() : null;
        const pts = rawLlngs
          ? (Array.isArray(rawLlngs[0]) ? rawLlngs[0] : rawLlngs)
          : [l.getLatLng()];

        if (isPolygon) {
          const ring = [...pts, pts[0]];
          kml += '<Placemark><Style><PolyStyle><color>801469ff</color><fill>1</fill><outline>1</outline></PolyStyle><LineStyle><color>ff1469ff</color><width>2</width></LineStyle></Style>';
          kml += '<Polygon><outerBoundaryIs><LinearRing><coordinates>';
          ring.forEach(p => { kml += `${p.lng},${p.lat},0 `; });
          kml += '</coordinates></LinearRing></outerBoundaryIs></Polygon></Placemark>';
        } else {
          kml += '<Placemark><LineString><coordinates>';
          pts.forEach(p => { kml += `${p.lng},${p.lat},0 `; });
          kml += '</coordinates></LineString></Placemark>';
        }
      });

      kml += '</Document></kml>';

      if (window.AndroidDownloadBridge && window.AndroidDownloadBridge.saveKmlFile) {
        window.AndroidDownloadBridge.saveKmlFile(kml, 'Sodestus_Traced_Map.kml');
        Toast.show('KML exporting natively…', 'info');
        return;
      }

      const a = Object.assign(document.createElement('a'), {
        href:     URL.createObjectURL(new Blob([kml], { type:'application/vnd.google-earth.kml+xml' })),
        download: 'Sodestus_Traced_Map.kml',
      });
      a.click(); URL.revokeObjectURL(a.href);
      if (fmbRef) {
        Toast.show('KML exported with FMB geo-reference', 'ok');
      } else {
        Toast.show('KML exported', 'ok');
      }
    };

    document.getElementById('uploadFile').addEventListener('change', e => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          if (file.name.endsWith('.kml')) {
            const k = omnivore.kml.parse(ev.target.result).addTo(map);
            k.on('ready', () => { map.fitBounds(k.getBounds()); Toast.show('KML loaded', 'ok'); });
          } else {
            const j = L.geoJSON(JSON.parse(ev.target.result)).addTo(map);
            map.fitBounds(j.getBounds());
            Toast.show('GeoJSON loaded', 'ok');
          }
        } catch { Toast.show('Format error — unsupported file', 'error'); }
      };
      reader.readAsText(file);
    });

    return { exportKML, exportKMZ, exportGeoImage };
  })();

  /* ── MODULE: UI ── */
  const UI = {
    expand(name) {
      const target = document.getElementById(`group-${name}`);
      const wasOpen = target?.classList.contains('open');
      TOOL_GROUPS.forEach(g => {
        document.getElementById(`group-${g}`)?.classList.remove('open');
        const ids = [`main${g.charAt(0).toUpperCase()+g.slice(1)}Btn`, `${g}Btn`, 'drawMainGroupBtn'];
        ids.forEach(id => document.getElementById(id)?.classList.remove('on-accent'));
      });
      if (target && !wasOpen) {
        target.classList.add('open');
        const mainBtnId = name === 'drawGroup' ? 'drawMainGroupBtn' : `${name}Btn`;
        document.getElementById(mainBtnId)?.classList.add('on-accent');
      }
      this.syncMinimize();
    },
    syncMinimize() {
      const ribbon = document.getElementById('ribbon');
      if (!ribbon) return;

      if (ribbon.matches(':hover') || ribbon.classList.contains('expanded-touch')) {
        ribbon.classList.remove('minimized');
        return;
      }

      const hasActiveDraw = !!(map.pm && map.pm.GlobalDrawMode);
      const hasActiveEdit = !!State.editMode;
      const hasActiveRoute = !!State.routeMode;
      const hasActiveErase = !!State.eraseMode;
      const hasActiveTouchMove = !!State.touchMove;

      const subgroups = Array.from(document.querySelectorAll('.sub-group'));
      const anySubgroupOpen = subgroups.some(sg => sg.classList.contains('open'));

      const hasHighlightedButton = !!document.querySelector('.rb.on-accent');

      const shouldMinimize = hasActiveDraw || hasActiveEdit || hasActiveRoute || hasActiveErase || hasActiveTouchMove || anySubgroupOpen || hasHighlightedButton;

      if (shouldMinimize) {
        ribbon.classList.add('minimized');
      } else {
        ribbon.classList.remove('minimized');
      }
    }
  };

  /* ── PUBLIC NAMESPACE ── */
  window.GIS = { Layers, Search, GPS, Draw, FMB, UI, IO };

  /* ── BOOT ── */
  map.whenReady(() => {
    const splash = document.getElementById('splash');
    splash.classList.add('gone');
    setTimeout(() => splash.remove(), 400);
    showUI();
    
    UI.syncMinimize();
    setInterval(() => UI.syncMinimize(), 350);

    const ribbonElem = document.getElementById('ribbon');
    if (ribbonElem) {
      ribbonElem.addEventListener('touchstart', (e) => {
        e.stopPropagation();
        ribbonElem.classList.add('expanded-touch');
      }, { passive: true });

      ribbonElem.addEventListener('click', (e) => {
        e.stopPropagation();
        ribbonElem.classList.add('expanded-touch');
      });
      
      ribbonElem.addEventListener('mouseenter', () => {
        ribbonElem.classList.remove('minimized');
      });
    }

    document.addEventListener('touchstart', (e) => {
      if (ribbonElem && !ribbonElem.contains(e.target)) {
        ribbonElem.classList.remove('expanded-touch');
      }
    }, { passive: true });

    document.addEventListener('click', (e) => {
      if (ribbonElem && !ribbonElem.contains(e.target)) {
        ribbonElem.classList.remove('expanded-touch');
      }
    });

    window.onBackPressed = function() {
      const openSubgroup = document.querySelector('.sub-group.open');
      if (openSubgroup) {
        UI.expand(null);
        return true; 
      }

      if (ribbonElem && ribbonElem.classList.contains('expanded-touch')) {
        ribbonElem.classList.remove('expanded-touch');
        return true; 
      }

      if (map.pm && map.pm.GlobalDrawMode) {
        map.pm.disableDraw();
        State.drawing = false;
        UI.syncMinimize();
        return true; 
      }

      if (State.editMode) {
        Draw.toggleEdit();
        return true; 
      }

      if (State.eraseMode) {
        Draw.toggleErase();
        return true; 
      }

      if (State.routeMode) {
        Draw.toggleRouteMode();
        return true; 
      }

      if (State.touchMove) {
        FMB.toggleTouch();
        return true; 
      }

      return false;
    };
  });

})();
</script>
</body>
</html>
