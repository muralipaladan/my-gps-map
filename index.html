<!DOCTYPE html>
<html>
<head>
    <title>Professional GIS - Murali Sir</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-geodesy/0.2.1/leaflet-geodesy.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        #map { height: 100vh; width: 100%; position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
        .village-style { filter: contrast(500%) brightness(40%) saturate(10) blur(0.2px) hue-rotate(320deg) !important; opacity: 1; }

        .leaflet-control-layers, .leaflet-draw, .control-panel, .leaflet-bar, .gps-control {
            opacity: 0; visibility: hidden; transition: opacity 0.6s ease, visibility 0.6s; pointer-events: none;
        }
        .show-ui .leaflet-control-layers, .show-ui .leaflet-draw, .show-ui .control-panel, .show-ui .leaflet-bar, .show-ui .gps-control {
            opacity: 1; visibility: visible; pointer-events: auto;
        }

        .control-panel {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.95); padding: 8px 15px; border-radius: 30px;
            display: flex; flex-direction: row; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .gps-button {
            background-color: white; border: 2px solid rgba(0,0,0,0.2);
            border-radius: 50%; padding: 8px; cursor: pointer;
            font-size: 18px; color: #333; text-align: center;
            display: block; width: 44px; height: 44px; line-height: 24px;
        }
        .gps-active { color: white !important; background-color: #28a745 !important; }
        
        .btn { background: #007bff; color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .save-note-btn { background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        .del-note-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-top: 5px; margin-left: 5px; }
    </style>
</head>
<body class="show-ui">

<div id="map"></div>

<div class="control-panel">
    <button class="btn" onclick="downloadKML()"><i class="fa-solid fa-download"></i> Save KML</button>
</div>

<script>
    var map = L.map('map', { center: [11.196, 76.227], zoom: 14, zoomControl: false });

    // Maps
    var gHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    var bhuvanURL = 'https://bhuvan-panchayat3.nrsc.gov.in/geoserver/gwc/service/wms';
    var vLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:village', format: 'image/png', transparent: true, className: 'village-style' }).addTo(map);
    var cLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:cadastral', format: 'image/png', transparent: true });

    L.control.layers({ "Hybrid": gHybrid }, { "Village": vLayer, "Cadastral": cLayer }, { collapsed: false }).addTo(map);

    // --- LOCAL STORAGE LOGIC ---
    var savedPins = JSON.parse(localStorage.getItem('muraliPins') || '[]');
    var pinLayerGroup = L.layerGroup().addTo(map);

    function savePin(lat, lng, note) {
        var pin = { lat: lat, lng: lng, note: note, id: Date.now() };
        savedPins.push(pin);
        localStorage.setItem('muraliPins', JSON.stringify(savedPins));
        renderPins();
    }

    function deletePin(id) {
        savedPins = savedPins.filter(p => p.id !== id);
        localStorage.setItem('muraliPins', JSON.stringify(savedPins));
        renderPins();
    }

    function renderPins() {
        pinLayerGroup.clearLayers();
        savedPins.forEach(p => {
            var m = L.marker([p.lat, p.lng]).addTo(pinLayerGroup);
            m.bindPopup('<b>Note:</b><br>' + p.note + '<br><button class="del-note-btn" onclick="deletePin(' + p.id + ')">Delete</button>');
        });
    }
    renderPins();

    // --- AREA CALCULATION ---
    var drawnItems = new L.FeatureGroup().addTo(map);
    var drawControl = new L.Control.Draw({
        edit: { featureGroup: drawnItems },
        draw: { polygon: true, polyline: true, marker: true, circle: false, rectangle: true }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
        var layer = e.layer;
        drawnItems.addLayer(layer);
        
        if (e.layerType === 'polygon' || e.layerType === 'rectangle') {
            var area = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
            var acres = (area * 0.000247105).toFixed(3);
            layer.bindPopup("<b>Area:</b><br>" + area.toFixed(2) + " Sq.m<br>" + acres + " Acres").openPopup();
        }

        if (e.layerType === 'marker') {
            var latlng = layer.getLatLng();
            var popupNode = document.createElement('div');
            popupNode.innerHTML = '<textarea id="noteText" placeholder="Write note..."></textarea><br><button class="save-note-btn">Save to Phone</button>';
            popupNode.querySelector('button').onclick = () => {
                savePin(latlng.lat, latlng.lng, popupNode.querySelector('#noteText').value);
                map.removeLayer(layer);
            };
            layer.bindPopup(popupNode).openPopup();
        }
    });

    // --- UI HELPERS ---
    var uiTimer;
    function showUI() { document.body.classList.add('show-ui'); clearTimeout(uiTimer); uiTimer = setTimeout(() => document.body.classList.remove('show-ui'), 6000); }
    map.on('mousedown dragstart zoomstart', showUI);

    // GPS
    var isTracking = false;
    var gpsCtrl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function (map) {
            var btn = L.DomUtil.create('a', 'gps-button gps-control');
            btn.innerHTML = '<i class="fa-solid fa-location-arrow"></i>';
            L.DomEvent.on(btn, 'click', (e) => {
                L.DomEvent.stopPropagation(e); showUI();
                if (!isTracking) { map.locate({ setView: true, watch: true }); btn.classList.add('gps-active'); isTracking = true; }
                else { map.stopLocate(); btn.classList.remove('gps-active'); isTracking = false; }
            });
            return btn;
        }
    });
    map.addControl(new gpsCtrl());

    showUI();
</script>
</body>
</html>
