<!DOCTYPE html>
<html>
<head>
    <title>Murali Sir's Master GIS Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/@mapbox/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        #map { height: 100vh; width: 100%; position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
        
        /* Village Boundary Highlighter (Bhuvan) */
        .village-style { filter: contrast(500%) brightness(40%) saturate(10) blur(0.2px) hue-rotate(320deg) !important; opacity: 1; }

        /* UI Auto-Hide Logic */
        .leaflet-control-layers, .leaflet-draw, .control-panel, .leaflet-bar, .gps-control {
            opacity: 0; visibility: hidden; transition: opacity 0.6s ease; pointer-events: none;
        }
        .show-ui .leaflet-control-layers, .show-ui .leaflet-draw, .show-ui .control-panel, .show-ui .leaflet-bar, .show-ui .gps-control {
            opacity: 1; visibility: visible; pointer-events: auto;
        }

        /* Bottom Control Panel */
        .control-panel {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.95); padding: 8px 15px; border-radius: 30px;
            display: flex; flex-direction: row; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* GPS Button Style */
        .gps-button {
            background-color: white; border: 2px solid rgba(0,0,0,0.2);
            border-radius: 50%; padding: 8px; cursor: pointer;
            font-size: 18px; color: #333; width: 44px; height: 44px; text-align: center;
        }
        .gps-active { color: white !important; background-color: #007bff !important; border-color: #0056b3 !important; }
        
        /* User Live Location Blue Dot */
        .blue-dot {
            width: 15px; height: 15px; background-color: #007bff;
            border: 3px solid white; border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .btn { background: #007bff; color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .nav-btn { background: #28a745; color: white; border: none; padding: 6px; border-radius: 4px; width: 100%; cursor: pointer; margin-top: 5px; font-weight: bold; }
        .del-btn { background: #dc3545; color: white; border: none; padding: 4px; border-radius: 4px; width: 100%; cursor: pointer; margin-top: 5px; }
        
        #hintText { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 2000; background: rgba(0,0,0,0.6); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body class="show-ui">

<div id="hintText">Tap map for tools | Long press for Direction</div>
<div id="map"></div>

<div class="control-panel">
    <button class="btn" onclick="downloadKML()"><i class="fa-solid fa-file-export"></i> KML Save</button>
    <label class="btn" style="background: #6c757d;">
        <i class="fa-solid fa-file-import"></i> Load <input type="file" id="uploadKML" accept=".kml" style="display:none">
    </label>
</div>

<script>
    // --- 1. BASE MAPS ---
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    var gHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });
    var gRoad = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });

    // --- 2. BHUVAN LAYERS ---
    var bhuvanURL = 'https://bhuvan-panchayat3.nrsc.gov.in/geoserver/gwc/service/wms';
    var vLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:village', format: 'image/png', transparent: true, className: 'village-style' });
    var cLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:cadastral', format: 'image/png', transparent: true });

    // --- 3. MAP INITIALIZATION ---
    var map = L.map('map', { center: [11.196, 76.227], zoom: 14, layers: [gHybrid, vLayer], zoomControl: false });

    var baseMaps = { "Google Hybrid": gHybrid, "Google Road": gRoad, "OSM Map": osm };
    var overlayMaps = { "Village Boundary": vLayer, "Cadastral (Survey)": cLayer };
    L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    // --- 4. GPS BLUE DOT & TRACKING ---
    var uMarker, aCircle, isGPS = false;
    var blueIcon = L.divIcon({ className: 'blue-dot', iconSize: [15, 15], iconAnchor: [7, 7] });

    var gpsCtrl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function(map) {
            var btn = L.DomUtil.create('a', 'gps-button gps-control');
            btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i>';
            L.DomEvent.on(btn, 'click', (e) => {
                L.DomEvent.stopPropagation(e); showUI();
                if(!isGPS) {
                    map.locate({setView: true, watch: true, enableHighAccuracy: true});
                    btn.classList.add('gps-active'); isGPS = true;
                } else {
                    map.stopLocate();
                    if(uMarker) map.removeLayer(uMarker);
                    if(aCircle) map.removeLayer(aCircle);
                    uMarker = null; aCircle = null;
                    btn.classList.remove('gps-active'); isGPS = false;
                }
            });
            return btn;
        }
    });
    map.addControl(new gpsCtrl());

    map.on('locationfound', function(e) {
        if(!uMarker) {
            uMarker = L.marker(e.latlng, {icon: blueIcon}).addTo(map);
            aCircle = L.circle(e.latlng, {radius: e.accuracy, color: '#007bff', opacity: 0.2, fillOpacity: 0.1}).addTo(map);
        } else {
            uMarker.setLatLng(e.latlng); aCircle.setLatLng(e.latlng).setRadius(e.accuracy);
        }
    });

    // --- 5. PERMANENT NOTES (PHONE MEMORY) ---
    var pinGroup = L.layerGroup().addTo(map);
    var savedNotes = JSON.parse(localStorage.getItem('murali_master_notes') || '[]');

    function renderNotes() {
        pinGroup.clearLayers();
        savedNotes.forEach((p, idx) => {
            var m = L.marker([p.lat, p.lng]).addTo(pinGroup);
            m.bindPopup(`<b>Note:</b><br>${p.text}<br><button class="nav-btn" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}')">Directions</button><button class="del-btn" onclick="deleteNote(${idx})">Delete</button>`);
        });
    }

    window.deleteNote = function(idx) {
        savedNotes.splice(idx, 1);
        localStorage.setItem('murali_master_notes', JSON.stringify(savedNotes));
        renderNotes();
    };
    renderNotes();

    // --- 6. DRAWING & AREA (ACRES/CENTS) ---
    var drawnItems = new L.FeatureGroup().addTo(map);
    var drawControl = new L.Control.Draw({
        edit: { featureGroup: drawnItems },
        draw: { polygon: true, polyline: true, marker: true, rectangle: true, circle: false }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
        var layer = e.layer;
        drawnItems.addLayer(layer);

        if (e.layerType === 'polygon' || e.layerType === 'rectangle') {
            var area = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
            var acres = (area * 0.000247105).toFixed(3);
            var cents = (area * 0.0247105).toFixed(2);
            layer.bindPopup(`<b>Land Area:</b><br>${area.toFixed(2)} Sq.m<br>${acres} Acres<br>${cents} Cents`).openPopup();
        }

        if (e.layerType === 'marker') {
            var ll = layer.getLatLng();
            var content = `<div><textarea id="tempNote" style="width:140px;height:50px;"></textarea><br><button class="btn" onclick="saveNote(${ll.lat},${ll.lng})">Save to Phone</button></div>`;
            layer.bindPopup(content).openPopup();
        }
    });

    window.saveNote = function(lat, lng) {
        var txt = document.getElementById('tempNote').value;
        if(txt) {
            savedNotes.push({ lat: lat, lng: lng, text: txt });
            localStorage.setItem('murali_master_notes', JSON.stringify(savedNotes));
            renderNotes(); map.closePopup();
        }
    };

    // --- 7. LONG PRESS FOR DIRECTIONS ---
    map.on('contextmenu', function(e) {
        showUI();
        var m = L.marker(e.latlng).addTo(map);
        m.bindPopup(`<button class="nav-btn" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${e.latlng.lat},${e.latlng.lng}')">Go to Google Maps</button>`).openPopup();
    });

    // --- 8. UI CONTROLS ---
    var uiTimer;
    function showUI() {
        document.body.classList.add('show-ui');
        clearTimeout(uiTimer);
        uiTimer = setTimeout(() => document.body.classList.remove('show-ui'), 6000);
    }
    map.on('mousedown dragstart zoomstart touchstart', showUI);

    // --- 9. KML EXPORT/IMPORT ---
    function downloadKML() {
        var kml = '<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>';
        drawnItems.eachLayer(l => {
            kml += '<Placemark><LineString><coordinates>';
            var c = l.getLatLngs ? (Array.isArray(l.getLatLngs()[0]) ? l.getLatLngs()[0] : l.getLatLngs()) : [l.getLatLng()];
            c.forEach(p => kml += `${p.lng},${p.lat},0 `);
            kml += '</coordinates></LineString></Placemark>';
        });
        kml += '</Document></kml>';
        var a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([kml], {type: "application/vnd.google-earth.kml+xml"}));
        a.download = "Field_Survey_Data.kml"; a.click();
    }

    document.getElementById('uploadKML').onchange = (e) => {
        var r = new FileReader();
        r.onload = (ev) => { 
            var l = omnivore.kml.parse(ev.target.result).addTo(map); 
            l.on('ready', () => map.fitBounds(l.getBounds())); 
        };
        r.readAsText(e.target.files[0]);
    };

    showUI();
</script>
</body>
</html>
