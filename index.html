<!DOCTYPE html>
<html>
<head>
    <title>Murali Sir's GIS - Live Tracker</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/@mapbox/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        #map { height: 100vh; width: 100%; position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
        
        .village-style { filter: contrast(500%) brightness(40%) saturate(10) blur(0.2px) hue-rotate(320deg) !important; opacity: 1; }

        /* UI Fade Logic */
        .leaflet-control-layers, .leaflet-draw, .control-panel, .leaflet-bar, .gps-control {
            opacity: 0; visibility: hidden; transition: opacity 0.6s ease; pointer-events: none;
        }
        .show-ui .leaflet-control-layers, .show-ui .leaflet-draw, .show-ui .control-panel, .show-ui .leaflet-bar, .show-ui .gps-control {
            opacity: 1; visibility: visible; pointer-events: auto;
        }

        .control-panel {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.95); padding: 8px 15px; border-radius: 30px;
            display: flex; flex-direction: row; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .gps-button {
            background-color: white; border: 2px solid rgba(0,0,0,0.2);
            border-radius: 50%; padding: 8px; cursor: pointer;
            font-size: 18px; color: #333; width: 44px; height: 44px; text-align: center;
        }
        .gps-active { color: white !important; background-color: #007bff !important; border-color: #0056b3 !important; }
        
        /* Blue Dot Style */
        .blue-dot {
            width: 15px; height: 15px; background-color: #007bff;
            border: 3px solid white; border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .btn { background: #007bff; color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .nav-btn { background: #28a745; color: white; border: none; padding: 6px; border-radius: 4px; width: 100%; cursor: pointer; margin-top: 5px; }
        .del-btn { background: #dc3545; color: white; border: none; padding: 4px; border-radius: 4px; width: 100%; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body class="show-ui">

<div id="map"></div>

<div class="control-panel">
    <button class="btn" onclick="downloadKML()"><i class="fa-solid fa-download"></i> KML Save</button>
</div>

<script>
    var map = L.map('map', { center: [11.196, 76.227], zoom: 14, zoomControl: false });

    // Maps
    var gHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    var bhuvanURL = 'https://bhuvan-panchayat3.nrsc.gov.in/geoserver/gwc/service/wms';
    var vLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:village', format: 'image/png', transparent: true, className: 'village-style' }).addTo(map);
    var cLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:cadastral', format: 'image/png', transparent: true });

    L.control.layers({ "Hybrid": gHybrid, "Road": L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {subdomains:['mt0','mt1','mt2','mt3']}) }, 
                     { "Village": vLayer, "Cadastral": cLayer }, { collapsed: false }).addTo(map);

    // --- BLUE DOT GPS LOGIC ---
    var userMarker, accuracyCircle, isTracking = false;
    
    var blueIcon = L.divIcon({ className: 'blue-dot', iconSize: [15, 15], iconAnchor: [7, 7] });

    var gpsCtrl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function (map) {
            var btn = L.DomUtil.create('a', 'gps-button gps-control');
            btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i>';
            L.DomEvent.on(btn, 'click', (e) => {
                L.DomEvent.stopPropagation(e); showUI();
                if (!isTracking) {
                    map.locate({ setView: true, watch: true, enableHighAccuracy: true });
                    btn.classList.add('gps-active'); isTracking = true;
                } else {
                    map.stopLocate();
                    if (userMarker) map.removeLayer(userMarker);
                    if (accuracyCircle) map.removeLayer(accuracyCircle);
                    userMarker = null; accuracyCircle = null;
                    btn.classList.remove('gps-active'); isTracking = false;
                }
            });
            return btn;
        }
    });
    map.addControl(new gpsCtrl());

    map.on('locationfound', function(e) {
        if (!userMarker) {
            userMarker = L.marker(e.latlng, { icon: blueIcon }).addTo(map);
            accuracyCircle = L.circle(e.latlng, { radius: e.accuracy, color: '#007bff', opacity: 0.2, fillOpacity: 0.1 }).addTo(map);
        } else {
            userMarker.setLatLng(e.latlng);
            accuracyCircle.setLatLng(e.latlng).setRadius(e.accuracy);
        }
    });

    // --- NOTES & AREA ---
    var pinGroup = L.layerGroup().addTo(map);
    var savedNotes = JSON.parse(localStorage.getItem('murali_notes') || '[]');

    function renderNotes() {
        pinGroup.clearLayers();
        savedNotes.forEach((p, index) => {
            var m = L.marker([p.lat, p.lng]).addTo(pinGroup);
            m.bindPopup(`<b>Note:</b><br>${p.text}<br><button class="nav-btn" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}')">Go to Google Maps</button><button class="del-btn" onclick="deleteNote(${index})">Delete Note</button>`);
        });
    }

    function deleteNote(idx) {
        savedNotes.splice(idx, 1);
        localStorage.setItem('murali_notes', JSON.stringify(savedNotes));
        renderNotes();
    }
    renderNotes();

    var drawnItems = new L.FeatureGroup().addTo(map);
    var drawControl = new L.Control.Draw({
        edit: { featureGroup: drawnItems },
        draw: { polygon: true, polyline: true, marker: true, rectangle: true, circle: false }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
        var layer = e.layer;
        drawnItems.addLayer(layer);

        if (e.layerType === 'polygon' || e.layerType === 'rectangle') {
            var area = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
            var acres = (area * 0.000247105).toFixed(3);
            var cents = (area * 0.0247105).toFixed(2);
            layer.bindPopup(`<b>Area:</b><br>${area.toFixed(2)} Sq.m<br>${acres} Acres<br>${cents} Cents`).openPopup();
        }

        if (e.layerType === 'marker') {
            var ll = layer.getLatLng();
            var content = `<div><textarea id="nt" style="width:140px;height:50px;"></textarea><br><button class="btn" onclick="saveNote(${ll.lat},${ll.lng})">Save Note</button></div>`;
            layer.bindPopup(content).openPopup();
        }
    });

    window.saveNote = function(lat, lng) {
        var txt = document.getElementById('nt').value;
        if(txt) {
            savedNotes.push({ lat: lat, lng: lng, text: txt });
            localStorage.setItem('murali_notes', JSON.stringify(savedNotes));
            renderNotes();
            map.closePopup();
        }
    };

    var uiTimer;
    function showUI() { document.body.classList.add('show-ui'); clearTimeout(uiTimer); uiTimer = setTimeout(() => document.body.classList.remove('show-ui'), 5000); }
    map.on('mousedown dragstart zoomstart touchstart', showUI);
