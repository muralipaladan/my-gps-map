<!DOCTYPE html>
<html>
<head>
    <title>GPS Tracker - Murali's Professional GIS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/@mapbox/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        #map { height: 100vh; width: 100%; position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
        
        /* Village Boundary Highlighter */
        .village-style { filter: contrast(500%) brightness(40%) saturate(10) blur(0.2px) hue-rotate(320deg) !important; opacity: 1; }

        /* UI Auto-Hide Logic */
        .leaflet-control-layers, .leaflet-draw, .control-panel, .leaflet-bar, .gps-control {
            opacity: 0; visibility: hidden; transition: opacity 0.6s ease, visibility 0.6s; pointer-events: none;
        }
        .show-ui .leaflet-control-layers, .show-ui .leaflet-draw, .show-ui .control-panel, .show-ui .leaflet-bar, .show-ui .gps-control {
            opacity: 1; visibility: visible; pointer-events: auto;
        }

        .control-panel {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.95); padding: 8px 15px; border-radius: 30px;
            display: flex; flex-direction: row; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .gps-button {
            background-color: white; border: 2px solid rgba(0,0,0,0.2);
            border-radius: 50%; padding: 8px; cursor: pointer;
            font-size: 18px; color: #333; text-align: center;
            display: block; width: 44px; height: 44px; line-height: 24px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .gps-active { color: white !important; background-color: #28a745 !important; border-color: #1e7e34 !important; }
        
        .btn, .file-label {
            background: #007bff; color: white; border: none;
            padding: 10px 18px; border-radius: 20px; cursor: pointer;
            font-size: 12px; text-align: center; font-weight: bold;
        }

        .nav-btn { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-top: 8px; display: block; width: 100%; }
    </style>
</head>
<body class="show-ui">

<div id="map"></div>

<div class="control-panel">
    <button class="btn" onclick="downloadKML()"><i class="fa-solid fa-download"></i> Save KML</button>
    <label class="file-label">
        <i class="fa-solid fa-upload"></i> Load KML <input type="file" id="uploadKML" accept=".kml">
    </label>
</div>

<script>
    // --- 1. BASE MAPS ---
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' });
    var gHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });
    var gRoad = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });

    // --- 2. BHUVAN LAYERS ---
    var bhuvanURL = 'https://bhuvan-panchayat3.nrsc.gov.in/geoserver/gwc/service/wms';
    var vLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:village', format: 'image/png', transparent: true, className: 'village-style' });
    var cLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:cadastral', format: 'image/png', transparent: true });

    // --- 3. INITIALIZE MAP ---
    var map = L.map('map', { 
        center: [11.196, 76.227], 
        zoom: 14, 
        layers: [gHybrid, vLayer], // Default on Startup
        zoomControl: false 
    });

    // --- 4. LAYER CONTROL ---
    var baseMaps = { "Google Hybrid": gHybrid, "Google Road": gRoad, "OSM Map": osm };
    var overlayMaps = { "Village Map": vLayer, "Cadastral Map": cLayer };
    L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    // --- 5. UI AUTO-HIDE ---
    var uiTimer;
    function showUI() {
        document.body.classList.add('show-ui');
        clearTimeout(uiTimer);
        uiTimer = setTimeout(function() { document.body.classList.remove('show-ui'); }, 6000);
    }
    map.on('click dragstart zoomstart touchstart', showUI);

    // --- 6. GPS ON/OFF ---
    var uMarker, aCircle, isTracking = false;
    var gpsCtrl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function (map) {
            var btn = L.DomUtil.create('a', 'gps-button gps-control');
            btn.innerHTML = '<i class="fa-solid fa-location-arrow"></i>';
            L.DomEvent.on(btn, 'click', function (e) {
                L.DomEvent.stopPropagation(e); showUI();
                if (!isTracking) {
                    map.locate({ setView: true, watch: true, enableHighAccuracy: true });
                    btn.classList.add('gps-active'); isTracking = true;
                } else {
                    map.stopLocate();
                    if (uMarker) map.removeLayer(uMarker);
                    if (aCircle) map.removeLayer(aCircle);
                    uMarker = null; aCircle = null;
                    btn.classList.remove('gps-active'); isTracking = false;
                }
            });
            return btn;
        }
    });
    map.addControl(new gpsCtrl());

    map.on('locationfound', function(e) {
        if (!uMarker) {
            uMarker = L.circleMarker(e.latlng, { radius: 8, color: 'white', fillColor: '#007bff', fillOpacity: 1, weight: 2 }).addTo(map);
            aCircle = L.circle(e.latlng, { radius: e.accuracy, color: '#007bff', opacity: 0.3, fillOpacity: 0.1 }).addTo(map);
        } else {
            uMarker.setLatLng(e.latlng);
            aCircle.setLatLng(e.latlng).setRadius(e.accuracy);
        }
    });

    // --- 7. DIRECTION & POINT ---
    function goGoogle(lat, lng) {
        window.open("https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lng, '_blank');
    }

    map.on('contextmenu', function(e) {
        showUI();
        var m = L.marker(e.latlng).addTo(map);
        m.bindPopup('<button class="nav-btn" onclick="goGoogle(' + e.latlng.lat + ',' + e.latlng.lng + ')"><i class="fa-solid fa-diamond-turn-right"></i> Google Direction</button>').openPopup();
    });

    // --- 8. DRAWING TOOLS ---
    var dItems = new L.FeatureGroup().addTo(map);
    var dCtrl = new L.Control.Draw({
        edit: { featureGroup: dItems },
        draw: { polygon: true, polyline: true, rectangle: true, marker: true, circle: false }
    });
    map.addControl(dCtrl);
    map.on(L.Draw.Event.CREATED, function (e) { 
        dItems.addLayer(e.layer); 
        if (e.layerType === 'marker') e.layer.bindPopup('<button class="nav-btn" onclick="goGoogle(' + e.layer.getLatLng().lat + ',' + e.layer.getLatLng().lng + ')">Navigate Here</button>');
        showUI(); 
    });

    // --- 9. KML SAVE/LOAD ---
    function downloadKML() {
        if (dItems.getLayers().length === 0) return alert("Onnum draw cheythittilla!");
        var kml = '<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>';
        dItems.eachLayer(function(l) {
            kml += '<Placemark><LineString><coordinates>';
            var c = l.getLatLngs ? (Array.isArray(l.getLatLngs()[0]) ? l.getLatLngs()[0] : l.getLatLngs()) : [l.getLatLng()];
            c.forEach(p => kml += p.lng + ',' + p.lat + ',0 ');
            kml += '</coordinates></LineString></Placemark>';
        });
        kml += '</Document></kml>';
        var a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([kml], {type: "application/vnd.google-earth.kml+xml"}));
        a.download = "Murali_GIS_Data.kml"; a.click();
    }

    document.getElementById('uploadKML').addEventListener('change', function(e) {
        var r = new FileReader();
        r.onload = function(ev) {
            var l = omnivore.kml.parse(ev.target.result).addTo(map);
            l.on('ready', function() { map.fitBounds(l.getBounds()); });
        };
        r.readAsText(e.target.files[0]);
    });

    showUI();
</script>
</body>
</html>
