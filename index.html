<!DOCTYPE html>
<html>
<head>
    <title>Murali Master GIS - Pro Georeference & Tracing</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        #map { height: 100vh; width: 100%; position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; background: #000; }
        
        .village-style { filter: contrast(400%) brightness(50%) saturate(8) hue-rotate(320deg) !important; opacity: 0.9; }

        /* Smooth Ribbon Fading on Map Activity */
        .ubuntu-unified-ribbon, .control-panel {
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .show-ui .ubuntu-unified-ribbon, .show-ui .control-panel {
            opacity: 1; visibility: visible; pointer-events: auto;
        }

        /* Bottom Save/Load Panel */
        .control-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: rgba(255, 255, 255, 0.95); padding: 8px 15px; border-radius: 30px;
            display: flex; flex-direction: row; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            align-items: center;
        }

        /* Magnifier Window */
        #zoomBox {
            position: absolute; top: 20px; left: 70px; width: 130px; height: 130px;
            border: 3px solid #007bff; border-radius: 10px; z-index: 3000;
            background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: none; pointer-events: none; overflow: hidden;
        }

        .btn { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
        .nav-btn { background: #28a745; color: white; border: none; padding: 8px; border-radius: 5px; width: 100%; cursor: pointer; margin-top: 5px; font-weight: bold; }
        .del-btn { background: #dc3545; color: white; border: none; padding: 6px; border-radius: 4px; width: 100%; cursor: pointer; margin-top: 5px; font-size: 11px; }
        
        /* UNIFIED NARROW UBUNTU RIBBON */
        .ubuntu-unified-ribbon {
            position: absolute; top: 15px; left: 10px;
            z-index: 2000; background: rgba(22, 22, 22, 0.96); padding: 10px 4px; border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 10px;
            width: 46px; align-items: center; border: 1px solid rgba(255,255,255,0.15);
            max-height: 85vh; overflow-y: auto; overflow-x: hidden;
        }
        
        .ribbon-divider { width: 80%; height: 1px; background: rgba(255,255,255,0.2); margin: 2px 0; }

        /* Unified Button Style inside Ribbon */
        .ribbon-btn {
            background: rgba(255, 255, 255, 0.08); color: #fff; border: none;
            width: 38px; height: 38px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; transition: all 0.2s ease; position: relative;
        }
        .ribbon-btn:active, .ribbon-btn.active-main { background: #E66100 !important; color: white !important; }
        
        .fmb-load-btn { background: #28a745 !important; color: white !important; }
        .gps-btn-active { background: #007bff !important; color: white !important; }
        
        /* Submenu Container inside Ribbon */
        .sub-tool-group {
            display: none; flex-direction: column; gap: 5px; background: rgba(255,255,255,0.1);
            padding: 5px; border-radius: 6px; width: 90%; align-items: center; margin: 2px 0;
        }
        
        .mini-ribbon-btn { background: rgba(255,255,255,0.2); color: #fff; border: none; width: 32px; height: 32px; border-radius: 4px; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .mini-ribbon-btn:active { background: #ffc107; color: #000; }

        .dock-slider-container { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 4px 0; }
        .dock-slider { -webkit-appearance: none; width: 32px; height: 4px; background: #555; border-radius: 2px; outline: none; }
        .dock-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #E66100; cursor: pointer; }

        /* FIXED: GPS BLUE DOT AND CROSSHAIR MARKER CSS STYLE */
        .blue-dot-container { display: flex; align-items: center; justify-content: center; position: relative; }
        .blue-dot { width: 12px; height: 12px; background: #007bff; border: 2px solid #fff; border-radius: 50%; z-index: 5; box-shadow: 0 0 8px #007bff; }
        .cross-v { position: absolute; width: 2px; height: 60px; background: rgba(0, 123, 255, 0.7); }
        .cross-h { position: absolute; width: 60px; height: 2px; background: rgba(0, 123, 255, 0.7); }

        /* Hidden Core Leaflet Controls */
        .leaflet-control-layers, .leaflet-draw, .leaflet-control-geocoder { display: none !important; }
    </style>
</head>
<body class="show-ui">

<div id="map"></div>
<div id="zoomBox"></div> 

<div class="ubuntu-unified-ribbon" id="unifiedRibbon">
    
    <button class="ribbon-btn" id="customGpsBtn" title="Live GPS Location" onclick="toggleGpsService()">
        <i class="fa-solid fa-crosshairs"></i>
    </button>
    
    <div class="ribbon-divider"></div>
    
    <button class="ribbon-btn" id="customLineBtn" title="Draw Line" onclick="triggerLeafletDraw('polyline')">
        <i class="fa-solid fa-file-signature"></i>
    </button>
    <button class="ribbon-btn" id="customPolygonBtn" title="Draw Polygon" onclick="triggerLeafletDraw('polygon')">
        <i class="fa-solid fa-draw-polygon"></i>
    </button>
    <button class="ribbon-btn" id="customMarkerBtn" title="Save Note" onclick="triggerLeafletDraw('marker')">
        <i class="fa-solid fa-location-dot"></i>
    </button>
    
    <div class="ribbon-divider"></div>
    
    <button class="ribbon-btn" id="customLayerBtn" title="Map Layers" onclick="expandTool('layers')">
        <i class="fa-solid fa-layer-group"></i>
    </button>
    <div class="sub-tool-group" id="group-layers">
        <button class="mini-ribbon-btn" title="Google Hybrid" onclick="switchBaseLayer('hybrid')">H</button>
        <button class="mini-ribbon-btn" title="Google Road" onclick="switchBaseLayer('road')">R</button>
        <button class="mini-ribbon-btn" title="OpenStreetMap" onclick="switchBaseLayer('osm')">O</button>
        <div style="width:100%; height:1px; background:rgba(255,255,255,0.2); margin:4px 0;"></div>
        <button class="mini-ribbon-btn" id="layerToggleVillage" title="Toggle Village WMS" onclick="toggleWmsOverlay('village')" style="background:#ffc107; color:#000;">V</button>
        <button class="mini-ribbon-btn" id="layerToggleCadastral" title="Toggle Cadastral WMS" onclick="toggleWmsOverlay('cadastral')">C</button>
    </div>
    
    <div class="ribbon-divider"></div>
    
    <button class="ribbon-btn" id="customSearchBtn" title="Search Location" onclick="triggerLocationSearch()">
        <i class="fa-solid fa-magnifying-glass"></i>
    </button>
    
    <div class="ribbon-divider"></div>

    <label class="ribbon-btn fmb-load-btn" title="Load FMB Image">
        <i class="fa-solid fa-image"></i> <input type="file" id="uploadFMB" accept=".jpg,.jpeg,.png" style="display:none">
    </label>
    
    <div id="fmbTools" style="display: none; flex-direction: column; align-items: center; gap: 8px; width: 100%;">
        
        <div class="ribbon-divider"></div>

        <button id="touchToggleBtn" class="ribbon-btn" title="Touch Move Mode" onclick="toggleFMBTouch()">
            <i class="fa-solid fa-hand-pointer"></i>
        </button>

        <div class="ribbon-divider"></div>

        <button class="ribbon-btn" id="mainMoveBtn" title="Move FMB" onclick="expandTool('move')">
            <span>↖</span>
        </button>
        <div class="sub-tool-group" id="group-move">
            <button class="mini-ribbon-btn" onclick="adjustFMB('up')">↑</button>
            <button class="mini-ribbon-btn" onclick="adjustFMB('down')">↓</button>
            <button class="mini-ribbon-btn" onclick="adjustFMB('left')">←</button>
            <button class="mini-ribbon-btn" onclick="adjustFMB('right')">→</button>
        </div>

        <div class="ribbon-divider"></div>

        <button class="ribbon-btn" id="mainScaleBtn" title="Resize FMB" onclick="expandTool('scale')">
            <span>↗</span>
        </button>
        <div class="sub-tool-group" id="group-scale">
            <button class="mini-ribbon-btn" onclick="adjustFMB('zoomin')">+</button>
            <button class="mini-ribbon-btn" onclick="adjustFMB('zoomout')">-</button>
        </div>

        <div class="ribbon-divider"></div>

        <button class="ribbon-btn" id="mainRotateBtn" title="Rotate FMB" onclick="expandTool('rotate')">
            <span>↻</span>
        </button>
        <div class="sub-tool-group" id="group-rotate">
            <button class="mini-ribbon-btn" onclick="adjustFMB('rotL')">↰</button>
            <button class="mini-ribbon-btn" onclick="adjustFMB('rotR')">↱</button>
        </div>

        <div class="ribbon-divider"></div>

        <button class="ribbon-btn" id="mainOpacityBtn" title="FMB Opacity" onclick="expandTool('opacity')">
            <i class="fa-solid fa-eye"></i>
        </button>
        <div class="sub-tool-group" id="group-opacity">
            <div class="dock-slider-container">
                <input type="range" id="fmbOpacity" class="dock-slider" min="0.1" max="1" step="0.1" value="0.6">
            </div>
        </div>

        <div class="ribbon-divider"></div>

        <button class="ribbon-btn" style="background: rgba(220,53,69,0.15); color:#dc3545;" title="Remove FMB" onclick="removeFMB()">
            <i class="fa-solid fa-trash"></i>
        </button>
    </div>
</div>

<div class="control-panel">
    <button class="btn" onclick="downloadKML()"><i class="fa-solid fa-file-export"></i> Save KML</button>
    <label class="btn" style="background: #6c757d;">
        <i class="fa-solid fa-file-import"></i> Load KML <input type="file" id="uploadFile" accept=".kml,.json,.geojson" style="display:none">
    </label>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/@mapbox/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

<script>
    // 1. MAP & BASE LAYERS INITIALIZATION
    var gHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] });
    var gRoad = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] });
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 });

    var bhuvanURL = 'https://bhuvan-panchayat3.nrsc.gov.in/geoserver/gwc/service/wms';
    var vLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:village', format: 'image/png', transparent: true, className: 'village-style', maxZoom: 22, tileSize: 512, zoomOffset: -1 });
    var cLayer = L.tileLayer.wms(bhuvanURL, { layers: 'v3:cadastral', format: 'image/png', transparent: true, maxZoom: 22, tileSize: 512, zoomOffset: -1 });

    var map = L.map('map', { center: [11.196, 76.227], zoom: 16, layers: [gHybrid, vLayer], zoomControl: false, tap: false });
    
    var baseLayerGroup = { 'hybrid': gHybrid, 'road': gRoad, 'osm': osm };
    var hiddenGeocoder = L.Control.geocoder({ position: 'topright', defaultMarkGeocode: true }).addTo(map);

    var miniMap = L.map('zoomBox', { attributionControl: false, zoomControl: false, dragging: false, touchZoom: false, scrollWheelZoom: false, doubleClickZoom: false, boxZoom: false });
    L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(miniMap);

    function switchBaseLayer(layerKey) {
        for (var key in baseLayerGroup) { map.removeLayer(baseLayerGroup[key]); }
        map.addLayer(baseLayerGroup[layerKey]);
    }

    function toggleWmsOverlay(layerType) {
        var layer = (layerType === 'village') ? vLayer : cLayer;
        var btn = document.getElementById(layerType === 'village' ? 'layerToggleVillage' : 'layerToggleCadastral');
        if (map.hasLayer(layer)) {
            map.removeLayer(layer);
            btn.style.background = 'rgba(255,255,255,0.2)'; btn.style.color = '#fff';
        } else {
            map.addLayer(layer);
            btn.style.background = '#ffc107'; btn.style.color = '#000';
        }
    }

    function triggerLocationSearch() {
        var place = prompt("Enter Village / Location Name:");
        if (place) {
            hiddenGeocoder.options.geocoder.geocode(place, function(results) {
                if (results && results.length > 0) {
                    var firstLatLng = results[0].center;
                    map.setView(firstLatLng, 16);
                } else { alert("Location not found!"); }
            });
        }
    }

    // 2. DRAWING SYSTEM HANDLERS
    var drawnItems = new L.FeatureGroup().addTo(map);
    var drawControl = new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { circle: false, circlemarker: false, polyline: {}, polygon: {}, rectangle: {}, marker: {} } });
    map.addControl(drawControl);
    
    function triggerLeafletDraw(toolType) {
        drawControl._toolbars.draw._modes[toolType].handler.enable();
    }

    var isDrawing = false;
    map.on('draw:drawstart', () => { isDrawing = true; document.getElementById('zoomBox').style.display = 'block'; document.body.classList.add('show-ui'); });
    map.on('draw:drawstop', () => { isDrawing = false; document.getElementById('zoomBox').style.display = 'none'; showUI(); });
    map.on('mousemove', function(e) { if(isDrawing) { miniMap.setView(e.latlng, map.getZoom() + 3); } });

    map.on(L.Draw.Event.CREATED, (e) => {
        var layer = e.layer; drawnItems.addLayer(layer);
        if (e.layerType === 'polygon' || e.layerType === 'rectangle') {
            var area = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
            layer.bindPopup(`<b>Area:</b><br>${(area * 0.000247).toFixed(3)} Acres<br>${(area * 0.0247).toFixed(2)} Cents`).openPopup();
        }
        if (e.layerType === 'marker') {
            var ll = layer.getLatLng(), txt = prompt("Save Note:");
            if(txt) { savedNotes.push({lat: ll.lat, lng: ll.lng, text: txt}); localStorage.setItem('murali_final_v10', JSON.stringify(savedNotes)); renderNotes(); }
            map.removeLayer(layer);
        }
    });

    // 3. FMB SVG OVERLAY LOGIC
    var fmbSvgOverlay = null;
    var fmbImgDataUrl = "";
    var fmbLat, fmbLng, fmbWidth = 0.003, fmbHeight = 0.003, fmbAngle = 0;

    document.getElementById('uploadFMB').onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(event) {
            fmbImgDataUrl = event.target.result;
            var center = map.getCenter();
            fmbLat = center.lat; fmbLng = center.lng;
            fmbAngle = 0; fmbWidth = 0.0025; fmbHeight = 0.0025;
            renderSVGOverlay();
            document.getElementById('fmbTools').style.display = 'flex';
            showUI();
        };
        reader.readAsDataURL(file);
    };

    function renderSVGOverlay() {
        if (!fmbImgDataUrl) return;
        var sW = L.latLng(fmbLat - (fmbHeight/2), fmbLng - (fmbWidth/2));
        var nE = L.latLng(fmbLat + (fmbHeight/2), fmbLng + (fmbWidth/2));
        var bounds = L.latLngBounds(sW, nE);
        if (fmbSvgOverlay) map.removeLayer(fmbSvgOverlay);
        var svgElement = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svgElement.setAttribute('xmlns', "http://www.w3.org/2000/svg");
        svgElement.setAttribute('viewBox', "0 0 100 100");
        var svgImage = document.createElementNS("http://www.w3.org/2000/svg", "image");
        svgImage.setAttribute('width', '100'); svgImage.setAttribute('height', '100');
        svgImage.setAttribute('href', fmbImgDataUrl);
        svgImage.setAttribute('transform', `rotate(${fmbAngle} 50 50)`);
        svgElement.appendChild(svgImage);
        fmbSvgOverlay = L.svgOverlay(svgElement, bounds, { opacity: parseFloat(document.getElementById('fmbOpacity').value), interactive: false }).addTo(map);
    }

    function expandTool(toolName) {
        var targetGroup = document.getElementById('group-' + toolName);
        var mainButtons = ['Move', 'Scale', 'Rotate', 'Opacity', 'Layers'];
        
        mainButtons.forEach(btn => {
            var g = document.getElementById('group-' + btn.toLowerCase());
            var b = document.getElementById('main' + btn + 'Btn') || document.getElementById('custom' + btn + 'Btn');
            if (btn.toLowerCase() !== toolName) {
                if(g) g.style.display = 'none';
                if(b) b.classList.remove('active-main');
            }
        });

        if (targetGroup.style.display === 'flex') {
            targetGroup.style.display = 'none';
            var currentBtn = document.getElementById('main' + toolName.charAt(0).toUpperCase() + toolName.slice(1) + 'Btn') || document.getElementById('custom' + toolName.charAt(0).toUpperCase() + toolName.slice(1) + 'Btn');
            if(currentBtn) currentBtn.classList.remove('active-main');
        } else {
            targetGroup.style.display = 'flex';
            var currentBtn = document.getElementById('main' + toolName.charAt(0).toUpperCase() + toolName.slice(1) + 'Btn') || document.getElementById('custom' + toolName.charAt(0).toUpperCase() + toolName.slice(1) + 'Btn');
            if(currentBtn) currentBtn.classList.add('active-main');
        }
    }

    window.adjustFMB = function(action) {
        if (!fmbSvgOverlay) return;
        var zoomFactor = (22 - map.getZoom());
        var step = 0.000015 * (zoomFactor <= 0 ? 1 : zoomFactor);
        switch(action) {
            case 'up':    fmbLat += step; break;
            case 'down':  fmbLat -= step; break;
            case 'left':  fmbLng -= step; break;
            case 'right': fmbLng += step; break;
            case 'zoomin':  fmbWidth *= 1.03; fmbHeight *= 1.03; break;
            case 'zoomout': fmbWidth *= 0.97; fmbHeight *= 0.97; break;
            case 'rotL':  fmbAngle -= 1.5; break;
            case 'rotR':  fmbAngle += 1.5; break;
        }
        renderSVGOverlay();
    };

    window.removeFMB = function() {
        if (fmbSvgOverlay) { map.removeLayer(fmbSvgOverlay); fmbSvgOverlay = null; }
        fmbImgDataUrl = ""; document.getElementById('uploadFMB').value = "";
        document.getElementById('fmbTools').style.display = 'none';
        if(fmbTouchEditMode) toggleFMBTouch();
    };

    document.getElementById('fmbOpacity').addEventListener('input', function(e) {
        if (fmbSvgOverlay) fmbSvgOverlay.setOpacity(e.target.value);
    });

    // FMB TOUCH LOGIC
    var fmbTouchEditMode = false;
    window.toggleFMBTouch = function() {
        fmbTouchEditMode = !fmbTouchEditMode;
        var btn = document.getElementById('touchToggleBtn');
        if(fmbTouchEditMode) {
            map.dragging.disable(); map.touchZoom.disable(); map.scrollWheelZoom.disable();
            btn.classList.add('active-main');
        } else {
            map.dragging.enable(); map.touchZoom.enable(); map.scrollWheelZoom.enable();
            btn.classList.remove('active-main');
        }
    };

    var touchStartPos = null, startDist = 0, startCenter = null;
    var startFmbLat = 0, startFmbLng = 0, startFmbW = 0, startFmbH = 0;

    map.getContainer().addEventListener('touchstart', function(e) {
        if (!fmbTouchEditMode || !fmbSvgOverlay) return;
        e.preventDefault();
        if (e.touches.length === 1) {
            touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            startFmbLat = fmbLat; startFmbLng = fmbLng;
        } else if (e.touches.length === 2) {
            var dx = e.touches[0].clientX - e.touches[1].clientX;
            var dy = e.touches[0].clientY - e.touches[1].clientY;
            startDist = Math.sqrt(dx*dx + dy*dy);
            startCenter = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
            startFmbLat = fmbLat; startFmbLng = fmbLng; startFmbW = fmbWidth; startFmbH = fmbHeight;
        }
    }, {passive: false});

    map.getContainer().addEventListener('touchmove', function(e) {
        if (!fmbTouchEditMode || !fmbSvgOverlay) return;
        e.preventDefault();
        if (e.touches.length === 1 && touchStartPos) {
            var dx = e.touches[0].clientX - touchStartPos.x;
            var dy = e.touches[0].clientY - touchStartPos.y;
            var p1 = map.latLngToContainerPoint([startFmbLat, startFmbLng]);
            p1.x += dx; p1.y += dy;
            var newLatLng = map.containerPointToLatLng(p1);
            fmbLat = newLatLng.lat; fmbLng = newLatLng.lng;
            renderSVGOverlay();
        } else if (e.touches.length === 2 && startDist > 0) {
            var dx = e.touches[0].clientX - e.touches[1].clientX;
            var dy = e.touches[0].clientY - e.touches[1].clientY;
            var currentDist = Math.sqrt(dx*dx + dy*dy);
            var scale = currentDist / startDist;
            fmbWidth = startFmbW * scale; fmbHeight = startFmbH * scale;
            var currentCenter = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
            var cdx = currentCenter.x - startCenter.x;
            var cdy = currentCenter.y - startCenter.y;
            var p1 = map.latLngToContainerPoint([startFmbLat, startFmbLng]);
            p1.x += cdx; p1.y += cdy;
            var newLatLng = map.containerPointToLatLng(p1);
            fmbLat = newLatLng.lat; fmbLng = newLatLng.lng;
            renderSVGOverlay();
        }
    }, {passive: false});

    map.getContainer().addEventListener('touchend', function(e) {
        if (!fmbTouchEditMode) return;
        touchStartPos = null; startDist = 0;
    }, {passive: false});

    // 4. CROSSHAIR GPS CONTROLLERS
    var userMarker, accuracyCircle, isGPS = false;
    var firstGpsFix = true; 
    var crossIcon = L.divIcon({ className: 'blue-dot-container', html: '<div class="cross-v"></div><div class="cross-h"></div><div class="blue-dot"></div>', iconSize: [60, 60], iconAnchor: [30, 30] });

    function toggleGpsService() {
        var btn = document.getElementById('customGpsBtn');
        if(!isGPS) { firstGpsFix = true; isGPS = true; btn.classList.add('gps-btn-active'); startLocationTracking(); }
        else { stopLocationTracking(); btn.classList.remove('gps-btn-active'); }
    }
    function startLocationTracking() { map.locate({setView: false, watch: true, enableHighAccuracy: true}); }
    function stopLocationTracking() { map.stopLocate(); if(userMarker) map.removeLayer(userMarker); if(accuracyCircle) map.removeLayer(accuracyCircle); userMarker = null; accuracyCircle = null; isGPS = false; }

    map.on('locationfound', (e) => {
        if(firstGpsFix) { map.setView(e.latlng, 19); firstGpsFix = false; }
        else { map.panTo(e.latlng); }
        if(!userMarker) {
            userMarker = L.marker(e.latlng, {icon: crossIcon}).addTo(map);
            accuracyCircle = L.circle(e.latlng, {radius: e.accuracy, color: '#007bff', weight: 1, opacity: 0.3, fillOpacity: 0.05}).addTo(map);
        } else { userMarker.setLatLng(e.latlng); accuracyCircle.setLatLng(e.latlng).setRadius(e.accuracy); }
    });

    map.on('locationerror', (e) => {
        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            if(data.latitude && data.longitude) {
                var ipLatLng = L.latLng(data.latitude, data.longitude);
                if(firstGpsFix) { map.setView(ipLatLng, 16); firstGpsFix = false; } else { map.panTo(ipLatLng); }
                if(!userMarker) { userMarker = L.marker(ipLatLng, {icon: crossIcon}).addTo(map); } else { userMarker.setLatLng(ipLatLng); }
                alert("ശ്രദ്ധിക്കുക: ബ്രൗസർ സെക്യൂരിറ്റി കാരണം ഫോണിലെ കൃത്യമായ GPS ലഭ്യമല്ല. ഇപ്പോൾ ഇന്റർനെറ്റ് (IP) വഴിയുള്ള ഏകദേശ ലൊക്കേഷനാണ് കാണിക്കുന്നത്.");
            }
        });
    });

    // 5. DATA LOCAL STORAGE NOTES
    var pinGroup = L.layerGroup().addTo(map);
    var savedNotes = JSON.parse(localStorage.getItem('murali_final_v10') || '[]');
    function renderNotes() {
        pinGroup.clearLayers();
        savedNotes.forEach((p, i) => {
            L.marker([p.lat, p.lng]).addTo(pinGroup).bindPopup(`<b>Note:</b><br>${p.text}<br><button class="nav-btn" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}')">Navigate</button><button class="del-btn" onclick="deleteNote(${i})">Delete</button>`);
        });
    }
    window.deleteNote = (i) => { savedNotes.splice(i, 1); localStorage.setItem('murali_final_v10', JSON.stringify(savedNotes)); renderNotes(); };
    renderNotes();

    // 6. KML DATA IMPORT-EXPORT
    document.getElementById('uploadFile').onchange = function(e) {
        var file = e.target.files[0]; if (!file) return;
        var reader = new FileReader();
        reader.onload = function(event) {
            try {
                if (file.name.endsWith('.kml')) { var k = omnivore.kml.parse(event.target.result).addTo(map); k.on('ready', () => map.fitBounds(k.getBounds())); }
                else { var j = L.geoJSON(JSON.parse(event.target.result)).addTo(map); map.fitBounds(j.getBounds()); }
            } catch(err) { alert("Format Error"); }
        };
        reader.readAsText(file);
    };

    // 7. SMART INTERFACE TIMER MANAGEMENT (Auto-Hide)
    var uiTimer; 
    function showUI() { 
        document.body.classList.add('show-ui'); 
        clearTimeout(uiTimer); 
        uiTimer = setTimeout(() => { 
            if(!isDrawing && !fmbTouchEditMode) document.body.classList.remove('show-ui'); 
        }, 6000); 
    }
    
    map.on('dragstart zoomstart mousedown touchstart', function() {
        if(!isDrawing && !fmbTouchEditMode) { document.body.classList.remove('show-ui'); }
    });

    document.addEventListener('mousemove', showUI);
    document.addEventListener('keydown', showUI);
    document.addEventListener('touchstart', showUI);

    function downloadKML() {
        var kml = '<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>';
        drawnItems.eachLayer(l => {
            kml += '<Placemark><LineString><coordinates>';
            var c = l.getLatLngs ? (Array.isArray(l.getLatLngs()[0]) ? l.getLatLngs()[0] : l.getLatLngs()) : [l.getLatLng()];
            c.forEach(p => kml += `${p.lng},${p.lat},0 `);
            kml += '</coordinates></LineString></Placemark>';
        });
        kml += '</Document></kml>';
        var a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([kml])); a.download = "Murali_Traced_Map.kml"; a.click();
    }
    showUI();
</script>
</body>
</html>
